<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전원설비 공유 현황판</title>

<style>
:root { 
    --primary: #2c3e50; --accent: #e74c3c; --today: #3498db; --border: #dee2e6;
}

body {
    font-family: 'Pretendard', sans-serif;
    background: #f4f7f6;
    margin: 0;
    padding: 10px;
    color: #333;
}

.header {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    text-align: center;
    margin-bottom: 15px;
}

.nav-controls {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    margin-top: 10px;
}

.nav-btn {
    background: #fff;
    border: 1px solid #ddd;
    padding: 8px 15px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
}

#monthDisplay {
    font-size: 1.4rem;
    font-weight: 800;
    min-width: 160px;
    display: inline-block;
}

.calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
    max-width: 1200px;
    margin: auto;
}

.day-label {
    text-align: center;
    font-weight: bold;
    padding: 10px;
    background: var(--primary);
    color: white;
    border-radius: 6px;
}

.day-cell {
    background: white;
    border: 1px solid var(--border);
    border-radius: 10px;
    min-height: 160px;
    padding: 10px;
}

.date-number {
    font-size: 1.1rem;
    font-weight: bold;
    margin-bottom: 8px;
    display: block;
}

.is-today {
    border: 3px solid var(--today) !important;
    background: #ebf5fb;
}

.duty-container {
    background: #fcfcfc;
    border-radius: 6px;
    padding: 6px;
    font-size: 0.75rem;
    margin-bottom: 8px;
    border: 1px solid #eee;
}

.duty-row {
    display: flex;
    justify-content: space-between;
}

.vacation-list {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
}

.vacation-tag {
    font-size: 0.72rem;
    font-weight: bold;
    padding: 2px 6px;
    border-radius: 4px;
    cursor: pointer;
    background: #eee;
}

.food-btn {
    position: fixed;
    bottom: 100px;
    right: 30px;
    width: 60px;
    height: 60px;
    background: #27ae60;
    color: white;
    border-radius: 50%;
    border: none;
    font-size: 24px;
    cursor: pointer;
    z-index: 10;
}

.add-btn {
    position: fixed;
    bottom: 30px;
    right: 30px;
    width: 60px;
    height: 60px;
    background: var(--accent);
    color: white;
    border-radius: 50%;
    border: none;
    font-size: 30px;
    cursor: pointer;
    z-index: 10;
}

/* 색 유지 */
b[data-type^="주"] { color: #d4a017; }
b[data-type^="야"] { color: #8e44ad; }
b[data-type^="비"] { color: #27ae60; }

.week-sun .date-number { color: #e74c3c; }
.week-sat .date-number { color: #3498db; }

/* 날짜 선택기 숨김 */
#hiddenDateInput {
    position: fixed;
    top: -100px;
    left: -100px;
    visibility: hidden;
}

</style>
</head>

<body>

<div class="header">
    <div class="nav-controls">
        <button class="nav-btn" onclick="moveMonth(-1)">◀ 이전달</button>
        <span id="monthDisplay"></span>
        <button class="nav-btn" onclick="moveMonth(1)">다음달 ▶</button>
    </div>
</div>

<div class="calendar-grid" id="calendarGrid"></div>

<button class="food-btn" onclick="window.open('https://web.app', '_blank')">🍴</button>

<!-- 보이지 않는 날짜 선택 인풋 -->
<input type="date" id="hiddenDateInput">
<button class="add-btn" onclick="openAdd()">+</button>

<script>
// 순환: 주1(0), 주2(1), 야1(2), 야2(3), 비1(4), 비2(5)
const cycle = ['주1','주2','야1','야2','비1','비2'];
// 기준일: 2026년 4월 26일 (1조 야1 기준)
const baseDate = new Date(2026, 3, 26); 
const t1StartIdx = 2; // 야1

let current = new Date();

function load(){
    return JSON.parse(localStorage.getItem('vac') || '{}');
}
function save(data){
    localStorage.setItem('vac', JSON.stringify(data));
}

/* 근무 계산 함수 */
function getDuty(targetDate, groupOffset){
    const d1 = new Date(baseDate.getFullYear(), baseDate.getMonth(), baseDate.getDate());
    const d2 = new Date(targetDate.getFullYear(), targetDate.getMonth(), targetDate.getDate());
    
    const diff = Math.round((d2 - d1) / (1000 * 60 * 60 * 24));
    
    // 1조(야1), 2조(비1), 3조(주1)가 나오도록 오프셋 설정
    // groupOffset: 1조=0, 2조=2, 3조=4 (주주-야야-비비 순환에서 2칸씩 차이)
    const idx = (((t1StartIdx + diff + groupOffset) % 6) + 6) % 6;
    return cycle[idx];
}

function render(){
    const grid = document.getElementById('calendarGrid');
    grid.innerHTML = '';

    const y = current.getFullYear();
    const m = current.getMonth();
    const today = new Date();

    document.getElementById('monthDisplay').innerText = `${y}년 ${m+1}월`;

    const data = load();

    ['일','월','화','수','목','금','토'].forEach(d => {
        const el = document.createElement('div');
        el.className = 'day-label';
        el.innerText = d;
        grid.appendChild(el);
    });

    const first = new Date(y, m, 1).getDay();
    const last = new Date(y, m + 1, 0).getDate();

    for(let i=0; i<first; i++) grid.appendChild(document.createElement('div'));

    for(let d=1; d<=last; d++){
        const date = new Date(y, m, d);
        const key = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const cell = document.createElement('div');
        cell.className = 'day-cell';

        if(date.toDateString() === today.toDateString()) cell.classList.add('is-today');
        if(date.getDay() === 0) cell.classList.add('week-sun');
        if(date.getDay() === 6) cell.classList.add('week-sat');

        let duty = '<div class="duty-container">';
        // 오프셋 0(1조), 2(2조), 4(3조)를 적용하여 4/26 기준 야1, 비1, 주1 완성
        const groupOffsets = [0, 2, 4];
        groupOffsets.forEach((off, i) => {
            const v = getDuty(date, off);
            duty += `<div class="duty-row"><span>${i+1}조</span><b data-type="${v}">${v}</b></div>`;
        });
        duty += '</div>';

        let vac = '<div class="vacation-list">';
        if(data[key]){
            data[key].forEach((v, i) => {
                vac += `<span class="vacation-tag" onclick="del('${key}',${i})">${v.name}(${v.type})</span>`;
            });
        }
        vac += '</div>';

        cell.innerHTML = `<span class="date-number">${d}</span>${duty}${vac}`;
        grid.appendChild(cell);
    }
}

/* 연차 추가 프로세스 */
function openAdd(){
    const name = prompt('이름을 입력하세요');
    if(!name) return;
    const type = prompt('구분 (연차/반차/출장 등)');
    if(!type) return;

    const dateInput = document.getElementById('hiddenDateInput');
    
    // 이전에 걸려있던 리스너 제거 및 새로 등록
    dateInput.onchange = function() {
        const dateValue = this.value;
        if(!dateValue) return;

        let data = load();
        if(!data[dateValue]) data[dateValue] = [];
        data[dateValue].push({name, type});
        save(data);
        
        this.value = ''; // 값 비우기
        render();
    };

    // 달력 UI 호출
    if (dateInput.showPicker) {
        dateInput.showPicker();
    } else {
        // showPicker 미지원 브라우저 대비
        alert('날짜 선택창이 뜨지 않으면 입력창을 직접 클릭해주세요.');
        dateInput.style.visibility = 'visible';
    }
}

function del(key, i){
    if(!confirm('삭제하시겠습니까?')) return;
    let data = load();
    data[key].splice(i, 1);
    if(data[key].length === 0) delete data[key];
    save(data);
    render();
}

function moveMonth(n){
    current.setMonth(current.getMonth() + n);
    render();
}

document.addEventListener('DOMContentLoaded', render);
</script>

</body>
</html>
