<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전원설비 WorkHub</title>
<style>
:root {
  --bg: #1a1a1e; --bg2: #242428; --bg3: #2e2e34; --bg4: #38383f;
  --border: #3a3a42; --text: #e8e8ed; --text2: #98989f; --text3: #58585f;
  --accent: #e8543a; --accent2: #ff6b50;
  --blue: #4a9eff; --green: #34c975; --amber: #ffb340; --purple: #bf5af2;
}
* { box-sizing: border-box; }
body {
  font-family: -apple-system,'Pretendard',sans-serif;
  background: var(--bg); margin: 0; padding: 10px;
  padding-bottom: 80px; color: var(--text);
  -webkit-user-select: none; user-select: none;
}
.header { background: var(--bg); padding: 14px 10px 10px; text-align: center; margin-bottom: 8px; }
.nav-controls { display: flex; justify-content: center; align-items: center; gap: 18px; }
.nav-btn {
  background: var(--bg3); border: none; padding: 6px 14px;
  border-radius: 8px; cursor: pointer; font-weight: 600;
  color: var(--text2); font-size: 0.85rem; transition: 0.15s;
}
.nav-btn:active { background: var(--bg4); }
#monthDisplay { font-size: 1.3rem; font-weight: 700; min-width: 140px; color: var(--text); }
.calendar-grid {
  display: grid; grid-template-columns: repeat(7,1fr);
  gap: 4px; max-width: 1200px; margin: auto;
}
.day-label {
  text-align: center; font-weight: 600; padding: 8px 0;
  background: transparent; color: var(--text3); font-size: 0.75rem; letter-spacing: 0.03em;
}
.day-cell {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 12px; min-height: 110px; padding: 7px 6px;
  display: flex; flex-direction: column; transition: 0.1s;
}
.day-cell:hover { border-color: var(--bg4); background: var(--bg3); }
@media (max-width: 600px) {
  .duty-container { display: none; }
  .day-cell { min-height: 72px; border-radius: 10px; }
  .date-number { font-size: 0.82rem; }
}
.is-today { background: var(--bg3) !important; border-color: var(--accent) !important; }
.is-today .date-number {
  background: var(--accent); color: #fff;
  width: 22px; height: 22px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.82rem; font-weight: 700;
}
.day-cell.add-mode { cursor: pointer; border: 1.5px dashed var(--accent); background: rgba(232,84,58,0.07); }
.date-number { font-size: 0.9rem; font-weight: 600; margin-bottom: 4px; color: var(--text); line-height: 1; }
.week-sun .date-number { color: #ff6b6b; }
.week-sat .date-number { color: var(--blue); }
.duty-container {
  background: rgba(255,255,255,0.04); border-radius: 5px; padding: 3px 4px;
  font-size: 0.64rem; margin-bottom: 4px; border: 1px solid rgba(255,255,255,0.06);
}
.duty-row { display: flex; justify-content: space-between; align-items: center; }
b[data-type^="주"] { color: var(--amber); }
b[data-type^="야"] { color: var(--purple); }
b[data-type^="비"] { color: var(--green); }
.item-list { display: flex; flex-direction: column; gap: 3px; margin-top: auto; }
.vacation-tag {
  font-size: 0.65rem; font-weight: 700; padding: 2px 5px;
  border-radius: 5px; background: rgba(232,84,58,0.18); color: #ff8a76;
  border: 1px solid rgba(232,84,58,0.3); cursor: pointer;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: center;
}
.img-thumb {
  width: 100%; height: 36px; object-fit: cover;
  border-radius: 5px; border: 1px solid var(--border); cursor: pointer; margin-top: 2px;
}
.quick-wrap {
  position: fixed; bottom: 0; left: 0; right: 0;
  display: flex; flex-direction: row; align-items: center;
  z-index: 100; background: var(--bg2); border-top: 1px solid var(--border);
  padding: 8px 12px; padding-bottom: calc(8px + env(safe-area-inset-bottom));
}
.quick-wrap a {
  width: 50px; height: 44px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text2); text-decoration: none; font-size: 20px;
  background: transparent; transition: 0.15s; margin-right: 6px;
  flex-direction: column; gap: 2px;
}
.quick-wrap a:active { background: var(--bg3); transform: scale(0.92); }
.quick-wrap a span.ql { font-size: 0.55rem; color: var(--text3); font-weight: 500; }
.add-btn {
  position: fixed; bottom: 72px; right: 16px;
  width: 52px; height: 52px; background: var(--accent);
  color: white; border-radius: 50%; border: none;
  font-size: 26px; cursor: pointer;
  z-index: 101; display: flex; align-items: center; justify-content: center; transition: 0.15s;
}
.add-btn:active { background: var(--accent2); transform: scale(0.93); }
#imgModal {
  display: none; position: fixed; top:0; left:0; width:100%; height:100%;
  background: rgba(0,0,0,0.92); z-index: 2000;
  justify-content: center; align-items: center;
}
#imgModal img { max-width: 95%; max-height: 90%; border-radius: 10px; }
#boardModal {
  display: none; position: fixed; top:0; left:0; width:100%; height:100%;
  background: rgba(0,0,0,0.7); z-index: 3000;
  justify-content: center; align-items: flex-start;
  padding: 20px; box-sizing: border-box; overflow-y: auto;
}
.board-container {
  background: var(--bg2); border-radius: 18px; width: 100%;
  max-width: 720px; margin: auto; border: 1px solid var(--border); overflow: hidden;
}
.board-header {
  background: var(--bg3); color: var(--text); padding: 16px 20px;
  display: flex; justify-content: space-between; align-items: center;
  border-bottom: 1px solid var(--border);
}
.board-header h2 { margin: 0; font-size: 1rem; font-weight: 700; }
.board-close {
  background: var(--bg4); border: none; color: var(--text2);
  font-size: 18px; cursor: pointer; line-height: 1;
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}
.board-tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--bg2); }
.board-tab {
  flex: 1; padding: 12px; border: none; background: none;
  font-size: 0.88rem; cursor: pointer; font-weight: 600;
  color: var(--text3); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: 0.15s;
}
.board-tab.active { color: var(--accent2); border-bottom-color: var(--accent2); }
.board-body { padding: 16px; }
.write-form { display: flex; flex-direction: column; gap: 10px; }
.write-form input, .write-form textarea, .write-form select {
  width: 100%; box-sizing: border-box;
  background: var(--bg3); border: 1px solid var(--border); border-radius: 10px;
  padding: 10px 12px; font-size: 0.9rem; font-family: inherit;
  outline: none; resize: vertical; color: var(--text);
}
.write-form input:focus, .write-form textarea:focus { border-color: var(--accent); }
.write-form select option { background: var(--bg3); }
.write-form textarea { min-height: 120px; }
.file-upload-area {
  border: 1.5px dashed var(--border); border-radius: 10px; padding: 18px;
  text-align: center; cursor: pointer; color: var(--text3); font-size: 0.85rem;
  transition: 0.2s; background: var(--bg3);
}
.file-upload-area:hover { border-color: var(--accent); color: var(--accent2); }
.file-preview { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
.file-chip {
  background: rgba(232,84,58,0.15); color: #ff8a76; border-radius: 20px;
  border: 1px solid rgba(232,84,58,0.25);
  padding: 4px 10px; font-size: 0.78rem; display: flex; align-items: center; gap: 6px;
}
.file-chip button { background: none; border: none; cursor: pointer; color: #ff8a76; font-size: 14px; padding: 0; line-height: 1; }
.submit-btn {
  background: var(--accent); color: white; border: none; border-radius: 10px;
  padding: 13px; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: 0.15s;
}
.submit-btn:active { background: var(--accent2); }
.submit-btn:disabled { background: var(--bg4); color: var(--text3); cursor: not-allowed; }
.post-filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
.cat-filter {
  padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border);
  background: var(--bg3); font-size: 0.8rem; cursor: pointer; color: var(--text2); transition: 0.15s;
}
.cat-filter.active { background: var(--accent); color: white; border-color: var(--accent); }
.post-list { display: flex; flex-direction: column; gap: 8px; }
.post-card {
  border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px;
  cursor: pointer; transition: 0.15s; background: var(--bg3);
}
.post-card:hover { border-color: var(--bg4); background: var(--bg4); }
.post-card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
.post-cat-badge {
  font-size: 0.68rem; font-weight: 700; padding: 2px 8px;
  border-radius: 10px; white-space: nowrap; flex-shrink: 0;
}
.post-title { font-size: 0.92rem; font-weight: 700; margin-bottom: 4px; color: var(--text); }
.post-meta { font-size: 0.75rem; color: var(--text3); }
.post-file-count { font-size: 0.75rem; color: var(--accent2); margin-top: 4px; }
.post-empty { text-align: center; color: var(--text3); padding: 40px 0; font-size: 0.9rem; }
.post-loading { text-align: center; color: var(--text3); padding: 20px 0; }
.post-detail { display: none; }
.post-detail.show { display: block; }
.post-list-wrap.hide { display: none; }
.back-btn {
  background: var(--bg3); border: 1px solid var(--border); border-radius: 8px;
  padding: 6px 12px; cursor: pointer; font-size: 0.85rem; color: var(--text2); margin-bottom: 12px;
}
.detail-title { font-size: 1.05rem; font-weight: 800; margin-bottom: 6px; color: var(--text); }
.detail-meta { font-size: 0.8rem; color: var(--text3); margin-bottom: 12px; }
.detail-body {
  font-size: 0.9rem; line-height: 1.7; color: var(--text2);
  white-space: pre-wrap; border-top: 1px solid var(--border); padding-top: 12px; margin-bottom: 12px;
}
.detail-files { border-top: 1px solid var(--border); padding-top: 12px; }
.detail-files h4 { font-size: 0.85rem; color: var(--text3); margin: 0 0 8px; }
.file-link {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px; background: rgba(232,84,58,0.12); border-radius: 8px;
  margin-bottom: 6px; text-decoration: none; color: #ff8a76; font-size: 0.85rem;
}
.detail-img { width: 100%; border-radius: 8px; margin-bottom: 8px; cursor: pointer; }
.delete-post-btn {
  background: none; border: 1px solid rgba(232,84,58,0.3); color: var(--accent2);
  border-radius: 8px; padding: 6px 12px; cursor: pointer; font-size: 0.8rem; margin-top: 10px;
}
.spinner {
  display: inline-block; width: 16px; height: 16px;
  border: 2px solid var(--bg4); border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.7s linear infinite;
  vertical-align: middle; margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.sync-badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 0.68rem; padding: 2px 7px; border-radius: 10px;
  margin-left: 8px; font-weight: 600;
}
.sync-badge.live { background: rgba(52,201,117,0.2); color: #34c975; }
.sync-badge.local { background: rgba(255,179,64,0.2); color: var(--amber); }
.sync-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
.sync-dot.pulse { animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.upload-progress {
  font-size: 0.8rem; color: var(--accent2); margin-top: 4px; display: none;
  background: rgba(232,84,58,0.08); border-radius: 8px; padding: 8px 12px;
}
.upload-progress.show { display: block; }
/* 업로드 진행바 */
.progress-bar-wrap {
  width: 100%; height: 6px; background: var(--bg4);
  border-radius: 3px; margin-top: 6px; overflow: hidden;
}
.progress-bar {
  height: 100%; background: var(--accent); border-radius: 3px;
  transition: width 0.3s ease; width: 0%;
}
.error-msg {
  background: rgba(232,84,58,0.12); border: 1px solid rgba(232,84,58,0.3); color: #ff8a76;
  border-radius: 8px; padding: 10px 12px; font-size: 0.85rem; margin-top: 6px; display: none;
}
.error-msg.show { display: block; }
</style>
</head>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import {
  getFirestore, collection, addDoc, getDocs, deleteDoc, doc,
  query, orderBy, serverTimestamp, onSnapshot
} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
import {
  getStorage, ref as storageRef, uploadBytesResumable, getDownloadURL, deleteObject
} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js';

const firebaseConfig = {
  apiKey: "AIzaSyArsOzrlKqK1BPH6ugGAhRWaq_gYmkvyIE",
  authDomain: "gogo-3d2c8.firebaseapp.com",
  projectId: "gogo-3d2c8",
  storageBucket: "gogo-3d2c8.firebasestorage.app",
  messagingSenderId: "156358451768",
  appId: "1:156358451768:web:5311651d3f83ce23b6fccd"
};

let db = null, storage = null, firebaseReady = false;

if (!window._vacationData) window._vacationData = {};
if (!window._allPosts) window._allPosts = [];

try {
  const app = initializeApp(firebaseConfig);
  db = getFirestore(app);
  storage = getStorage(app);
  firebaseReady = true;

  // 연차 실시간 동기화
  const vacRef = collection(db, 'vacations');
  onSnapshot(vacRef, (snapshot) => {
    const firestoreData = {};
    snapshot.docs.forEach(d => {
      const data = d.data();
      const dateKey = data.dateKey;
      if (dateKey) {
        if (!firestoreData[dateKey]) firestoreData[dateKey] = [];
        firestoreData[dateKey].push({ ...data, _firestoreId: d.id });
      }
    });
    window._vacationData = firestoreData;
    if (typeof window.renderCalendar === 'function') window.renderCalendar();
    const badge = document.getElementById('calSyncBadge');
    if (badge) {
      badge.className = 'sync-badge live';
      badge.innerHTML = '<span class="sync-dot pulse"></span> 실시간';
    }
  }, (err) => { console.warn('연차 onSnapshot 오류:', err); });

  // 게시글 실시간 구독
  const postsRef = query(collection(db, 'posts'), orderBy('createdAt', 'desc'));
  onSnapshot(postsRef, (snapshot) => {
    window._allPosts = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
    if (document.getElementById('boardModal').style.display === 'flex') {
      if (typeof window.renderPostList === 'function') window.renderPostList();
    }
    const badge = document.getElementById('boardSyncBadge');
    if (badge) {
      badge.className = 'sync-badge live';
      badge.innerHTML = '<span class="sync-dot pulse"></span> 실시간';
    }
  }, (err) => { console.warn('게시글 onSnapshot 오류:', err); });

} catch(e) {
  console.warn('Firebase 초기화 실패, 로컬 모드:', e);
}

// ── 이미지 압축 ──
function compressImage(file, maxW, quality) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('파일 읽기 실패'));
    reader.onload = e => {
      const img = new Image();
      img.onerror = () => reject(new Error('이미지 로드 실패'));
      img.onload = () => {
        const ratio = Math.min(maxW / img.width, maxW / img.height, 1);
        const canvas = document.createElement('canvas');
        canvas.width = img.width * ratio;
        canvas.height = img.height * ratio;
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        canvas.toBlob(blob => {
          if (!blob) reject(new Error('압축 실패'));
          else resolve(blob);
        }, 'image/jpeg', quality);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ── Firebase Storage에 파일 업로드 후 URL 반환 ──
function uploadFileToStorage(file, onProgress) {
  return new Promise(async (resolve, reject) => {
    try {
      const safeName = file.name.replace(/[^a-zA-Z0-9._\-가-힣]/g, '_');
      const path = `posts/${Date.now()}_${safeName}`;
      const fileRef = storageRef(storage, path);

      // 스마트폰에서 file.type이 빈 문자열로 올 수 있으므로 확장자로도 판단
      const ext = (file.name || '').split('.').pop().toLowerCase();
      const isImage = file.type.startsWith('image/') || ['jpg','jpeg','png','gif','webp','heic','heif'].includes(ext);

      let uploadTask;
      if (isImage) {
        // 이미지: 압축 후 업로드
        // ✅ await로 blob을 먼저 받은 뒤 uploadBytesResumable 호출 (체인 버그 수정)
        try {
          const blob = await compressImage(file, 1200, 0.85);
          uploadTask = uploadBytesResumable(fileRef, blob);
        } catch(compressErr) {
          // 압축 실패 시 원본으로 업로드
          console.warn('이미지 압축 실패, 원본 업로드:', compressErr);
          uploadTask = uploadBytesResumable(fileRef, file);
        }
      } else {
        // 이미지 외 파일: 원본 그대로 업로드
        uploadTask = uploadBytesResumable(fileRef, file);
      }

      uploadTask.on('state_changed',
        (snapshot) => {
          const pct = snapshot.totalBytes > 0
            ? Math.round(snapshot.bytesTransferred / snapshot.totalBytes * 100)
            : 0;
          if (onProgress) onProgress(pct);
        },
        (err) => reject(err),
        async () => {
          try {
            const downloadURL = await getDownloadURL(uploadTask.snapshot.ref);
            resolve({
              name: file.name,
              url: downloadURL,
              path: path,
              type: file.type || ('image/' + ext),
              size: file.size
            });
          } catch(urlErr) { reject(urlErr); }
        }
      );
    } catch(err) { reject(err); }
  });
}

// ── 로컬 폴백: base64 변환 (Firebase 불가 시) ──
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('파일 읽기 실패: ' + file.name));
    reader.onload = e => resolve(e.target.result);
    reader.readAsDataURL(file);
  });
}

// ── 연차 저장 ──
async function saveVacation(dateKey, entry) {
  if (firebaseReady) {
    const docData = { dateKey, name: entry.name || '', type: entry.type || '', img: entry.img || '' };
    await addDoc(collection(db, 'vacations'), docData);
  } else {
    const STORAGE_KEY = 'power_system_v5_stable';
    const raw = localStorage.getItem(STORAGE_KEY);
    const data = raw ? JSON.parse(raw) : {};
    if (!data[dateKey]) data[dateKey] = [];
    data[dateKey].push(entry);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    window._vacationData = data;
    if (typeof window.renderCalendar === 'function') window.renderCalendar();
  }
}

// ── 연차 삭제 ──
async function removeVacation(dateKey, index) {
  if (firebaseReady && window._vacationData) {
    const items = window._vacationData[dateKey] || [];
    const item = items[index];
    if (item && item._firestoreId) {
      await deleteDoc(doc(db, 'vacations', item._firestoreId));
      return;
    }
  }
  const STORAGE_KEY = 'power_system_v5_stable';
  const raw = localStorage.getItem(STORAGE_KEY);
  const data = raw ? JSON.parse(raw) : {};
  if (data[dateKey]) {
    data[dateKey].splice(index, 1);
    if (data[dateKey].length === 0) delete data[dateKey];
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    window._vacationData = data;
    if (typeof window.renderCalendar === 'function') window.renderCalendar();
  }
}

// ── 게시글 저장 (핵심 수정) ──
async function savePost(post, files) {
  const attachments = [];
  const progressEl = document.getElementById('uploadProgress');
  const progressText = document.getElementById('uploadProgressText');
  const progressBar = document.getElementById('progressBar');
  const errorEl = document.getElementById('uploadError');
  const MAX_MB = 10;

  errorEl.classList.remove('show');

  for (let i = 0; i < files.length; i++) {
    const file = files[i];

    if (file.size > MAX_MB * 1024 * 1024) {
      errorEl.textContent = `⚠️ "${file.name}" 파일이 ${MAX_MB}MB 초과합니다. 건너뜁니다.`;
      errorEl.classList.add('show');
      continue;
    }

    progressText.textContent = `📤 업로드 중... (${i+1}/${files.length}) ${file.name}`;
    progressBar.style.width = '0%';
    progressEl.classList.add('show');

    try {
      if (firebaseReady) {
        // ✅ Firebase Storage에 직접 업로드 → URL만 Firestore에 저장
        const att = await uploadFileToStorage(file, (pct) => {
          progressBar.style.width = pct + '%';
          progressText.textContent = `📤 업로드 중... (${i+1}/${files.length}) ${file.name} ${pct}%`;
        });
        attachments.push(att);
      } else {
        // 로컬 폴백: base64 (Firebase 없을 때만)
        const b64 = file.type.startsWith('image/')
          ? await new Promise((resolve, reject) => {
              compressImage(file, 1200, 0.85).then(blob => {
                const r = new FileReader();
                r.onload = e => resolve(e.target.result);
                r.onerror = () => reject(new Error('읽기 실패'));
                r.readAsDataURL(blob);
              }).catch(reject);
            })
          : await fileToBase64(file);
        attachments.push({ name: file.name, url: b64, type: file.type, size: file.size });
      }
    } catch (err) {
      console.error('파일 업로드 오류:', err);
      errorEl.textContent = `⚠️ "${file.name}" 업로드 실패: ${err.message}`;
      errorEl.classList.add('show');
    }
  }

  progressEl.classList.remove('show');
  progressBar.style.width = '0%';

  const postData = {
    ...post,
    attachments,   // ← URL만 담긴 배열 (base64 없음 → Firestore 크기 제한 문제 해결)
    createdAt: firebaseReady ? serverTimestamp() : Date.now()
  };

  if (firebaseReady) {
    const savePromise = addDoc(collection(db, 'posts'), postData);
    const timeoutPromise = new Promise((_, reject) =>
      setTimeout(() => reject(new Error('서버 저장 시간 초과. 네트워크를 확인하세요.')), 30000)
    );
    const docRef = await Promise.race([savePromise, timeoutPromise]);
    return { id: docRef.id, ...postData };
  } else {
    const BOARD_KEY = 'workhub_board_v1';
    const id = 'local_' + Date.now();
    const raw = localStorage.getItem(BOARD_KEY);
    const posts = raw ? JSON.parse(raw) : [];
    posts.unshift({ id, ...postData });
    localStorage.setItem(BOARD_KEY, JSON.stringify(posts));
    return { id, ...postData };
  }
}

// ── 게시글 삭제 (Storage 파일도 함께 삭제) ──
async function deletePost(id, attachments) {
  if (firebaseReady) {
    for (const att of (attachments || [])) {
      if (att.path) {
        try { await deleteObject(storageRef(storage, att.path)); } catch(e) {}
      }
    }
    await deleteDoc(doc(db, 'posts', id));
  } else {
    const BOARD_KEY = 'workhub_board_v1';
    const raw = localStorage.getItem(BOARD_KEY);
    let posts = raw ? JSON.parse(raw) : [];
    posts = posts.filter(p => p.id !== id);
    localStorage.setItem(BOARD_KEY, JSON.stringify(posts));
  }
}

async function loadPostsLocal() {
  const BOARD_KEY = 'workhub_board_v1';
  const raw = localStorage.getItem(BOARD_KEY);
  const posts = raw ? JSON.parse(raw) : [];
  return posts.sort((a, b) => b.createdAt - a.createdAt);
}

window._boardAPI = { savePost, deletePost, loadPostsLocal, firebaseReady: () => firebaseReady };
window._vacationAPI = { saveVacation, removeVacation };
window.dispatchEvent(new Event('boardAPIReady'));
</script>

<script>
window._vacationData = window._vacationData || {};
window._allPosts = window._allPosts || [];

const cycle = ['주1','주2','야1','야2','비1','비2'];
const baseDate = new Date(2026, 3, 26);
const t1StartIdx = 2;
let current = new Date();
let isAddMode = false;
let pendingEntry = { name: '', type: '', img: '' };
let activeDateKey = '';
const STORAGE_KEY = 'power_system_v5_stable';

window._attStore = {};

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function getFileIcon(name, mime) {
  const ext = (name || '').split('.').pop().toLowerCase();
  if (['xlsx','xls','csv'].includes(ext)) return { icon: '📊', color: '#1d6f42', label: 'Excel' };
  if (['hwp','hwpx'].includes(ext)) return { icon: '📝', color: '#0052a5', label: 'HWP' };
  if (['pdf'].includes(ext)) return { icon: '📄', color: '#e74c3c', label: 'PDF' };
  if (['doc','docx'].includes(ext)) return { icon: '📃', color: '#2b579a', label: 'Word' };
  if (['ppt','pptx'].includes(ext)) return { icon: '📊', color: '#d24726', label: 'PPT' };
  if (['zip','7z','rar'].includes(ext)) return { icon: '📦', color: '#888', label: 'ZIP' };
  if (mime && mime.startsWith('image/')) return { icon: '🖼️', color: '#e8543a', label: 'Image' };
  return { icon: '📎', color: '#666', label: ext.toUpperCase() || 'FILE' };
}

function getData() { return window._vacationData || {}; }

function getDutyValue(targetDate, offset) {
  const d1 = new Date(baseDate.getFullYear(), baseDate.getMonth(), baseDate.getDate());
  const d2 = new Date(targetDate.getFullYear(), targetDate.getMonth(), targetDate.getDate());
  const diff = Math.round((d2 - d1) / (1000 * 60 * 60 * 24));
  const idx = (((t1StartIdx + diff + offset) % 6) + 6) % 6;
  return cycle[idx];
}

window.renderCalendar = function() {
  const grid = document.getElementById('calendarGrid');
  if (!grid) return;
  grid.innerHTML = '';
  const y = current.getFullYear(), m = current.getMonth();
  document.getElementById('monthDisplay').innerText = y + '년 ' + (m + 1) + '월';
  const data = getData();

  ['일','월','화','수','목','금','토'].forEach(d => {
    const el = document.createElement('div');

  });

  const firstDay = new Date(y, m, 1).getDay();
  const lastDate = new Date(y, m + 1, 0).getDate();

  for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div'));

  for (let d = 1; d <= lastDate; d++) {
    const dateObj = new Date(y, m, d);
    const dateKey = y + '-' + String(m+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    const cell = document.createElement('div');
    cell.className = 'day-cell';
    if (dateObj.toDateString() === new Date().toDateString()) cell.classList.add('is-today');
    if (dateObj.getDay() === 0) cell.classList.add('week-sun');
    if (dateObj.getDay() === 6) cell.classList.add('week-sat');
    if (isAddMode) { cell.classList.add('add-mode'); cell.onclick = () => onCellClick(dateKey); }

    const num = document.createElement('span');
    num.className = 'date-number'; num.innerText = d; cell.appendChild(num);

    const dutyBox = document.createElement('div');
    dutyBox.className = 'duty-container';
    for (let k = 0; k < 3; k++) {
      const dutyName = getDutyValue(dateObj, k * 2);
      const row = document.createElement('div');
      row.className = 'duty-row';
      row.innerHTML = '<span>' + (k+1) + '조</span><b data-type="' + dutyName + '">' + dutyName + '</b>';
      dutyBox.appendChild(row);
    }
    cell.appendChild(dutyBox);

    const listContainer = document.createElement('div');
    listContainer.className = 'item-list';

    if (data[dateKey]) {
      data[dateKey].forEach((item, index) => {
        if (item.name) {
          const tag = document.createElement('div');
          tag.className = 'vacation-tag';
          tag.innerText = item.name + '(' + (item.type || '') + ')';
          tag.onclick = e => { e.stopPropagation(); deleteItem(dateKey, index); };
          listContainer.appendChild(tag);
        }
        if (item.img) {
          const imgEl = document.createElement('img');
          imgEl.src = item.img;
          imgEl.className = 'img-thumb';
          imgEl.onclick = e => { e.stopPropagation(); openZoom(item.img, item.name || '이미지'); };
          imgEl.oncontextmenu = e => { e.preventDefault(); deleteItem(dateKey, index); };
          listContainer.appendChild(imgEl);
        }
      });
    }
    cell.appendChild(listContainer);
    grid.appendChild(cell);
  }
};

function toggleAddMode() {
  if (isAddMode) {
    isAddMode = false;
    document.getElementById('mainAddBtn').innerText = '+';
    window.renderCalendar();
    return;
  }
  const name = prompt('성함을 입력하세요 (사진만 올리려면 확인)') || '';
  const type = name ? (prompt('종류 (연차/반차/교육 등)') || '') : '';
  pendingEntry = { name, type, img: '' };
  isAddMode = true;
  document.getElementById('mainAddBtn').innerText = '✕';
  alert('등록할 날짜 칸을 선택해 주세요.');
  window.renderCalendar();
}

function onCellClick(key) {
  activeDateKey = key;
  if (confirm('사진(파일)을 함께 등록하시겠습니까?')) {
    document.getElementById('imageInput').click();
  } else {
    if (pendingEntry.name || pendingEntry.img) {
      finishRegistration();
    } else {
      isAddMode = false;
      document.getElementById('mainAddBtn').innerText = '+';
      window.renderCalendar();
    }
  }
}

function handleFileUpload(input) {
  if (input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = e => { pendingEntry.img = e.target.result; finishRegistration(); };
    reader.onerror = () => { alert('파일 읽기 실패'); finishRegistration(); };
    reader.readAsDataURL(input.files[0]);
  } else {
    if (pendingEntry.name) finishRegistration();
    else { isAddMode = false; document.getElementById('mainAddBtn').innerText = '+'; window.renderCalendar(); }
  }
  input.value = '';
}

function waitForVacationAPI(timeout = 5000) {
  return new Promise((resolve) => {
    if (window._vacationAPI) { resolve(true); return; }
    const start = Date.now();
    const check = setInterval(() => {
      if (window._vacationAPI) { clearInterval(check); resolve(true); }
      else if (Date.now() - start > timeout) { clearInterval(check); resolve(false); }
    }, 100);
  });
}

async function finishRegistration() {
  isAddMode = false;
  document.getElementById('mainAddBtn').innerText = '+';
  if (!pendingEntry.name && !pendingEntry.img) { window.renderCalendar(); return; }
  const apiReady = await waitForVacationAPI(5000);
  if (!apiReady || !window._vacationAPI) { localSaveVacation(activeDateKey, { ...pendingEntry }); return; }
  try {
    await window._vacationAPI.saveVacation(activeDateKey, { ...pendingEntry });
  } catch(e) {
    console.warn('연차 저장 실패, 로컬 폴백:', e);
    localSaveVacation(activeDateKey, { ...pendingEntry });
  }
}

function localSaveVacation(dateKey, entry) {
  const raw = localStorage.getItem(STORAGE_KEY);
  const data = raw ? JSON.parse(raw) : {};
  if (!data[dateKey]) data[dateKey] = [];
  data[dateKey].push(entry);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  window._vacationData = data;
  window.renderCalendar();
}

async function deleteItem(key, idx) {
  if (!confirm('정말 삭제할까요?')) return;
  await waitForVacationAPI(3000);
  if (window._vacationAPI) {
    try { await window._vacationAPI.removeVacation(key, idx); }
    catch(e) { console.warn('연차 삭제 실패:', e); alert('삭제 실패: ' + e.message); }
  } else {
    const raw = localStorage.getItem(STORAGE_KEY);
    const data = raw ? JSON.parse(raw) : {};
    if (data[key]) {
      data[key].splice(idx, 1);
      if (data[key].length === 0) delete data[key];
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      window._vacationData = data;
      window.renderCalendar();
    }
  }
}

// 파일 열기 — Storage URL이면 바로 새탭, base64면 Blob으로 열기
function openFile(attKey) {
  const att = window._attStore[attKey];
  if (!att || !att.url) { alert('파일 데이터가 없습니다.'); return; }
  try {
    const src = att.url;
    // Storage에서 받은 https URL이면 바로 새탭에서 열기
    if (src.startsWith('https://')) { window.open(src, '_blank'); return; }
    // base64 (로컬 폴백) 처리
    if (!src.startsWith('data:')) { window.open(src, '_blank'); return; }
    const commaIdx = src.indexOf(',');
    if (commaIdx === -1) throw new Error('잘못된 형식');
    const mime = src.substring(5, commaIdx).split(';')[0] || 'application/octet-stream';
    const b64 = src.substring(commaIdx + 1);
    const bstr = atob(b64);
    const u8arr = new Uint8Array(bstr.length);
    for (let i = 0; i < bstr.length; i++) u8arr[i] = bstr.charCodeAt(i);
    const blob = new Blob([u8arr], { type: mime });
    const url = URL.createObjectURL(blob);
    window.open(url, '_blank');
    setTimeout(() => URL.revokeObjectURL(url), 60000);
  } catch(e) {
    console.error('파일 열기 실패:', e);
    downloadImg(att.url, att.name);
  }
}

function downloadAtt(attKey) {
  const att = window._attStore[attKey];
  if (!att || !att.url) { alert('파일 데이터가 없습니다.'); return; }
  // Storage URL이면 링크 다운로드
  const a = document.createElement('a');
  a.href = att.url;
  a.download = att.name || '파일';
  a.target = '_blank';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

    card.innerHTML = `
      <div class="post-card-header">

        <span class="post-cat-badge" style="background:${color}22;color:${color}">${escHtml(post.category)}</span>

function showPostDetail(post) {

  detail.classList.add('show');

  let ts;
  try { ts = post.createdAt?.seconds ? new Date(post.createdAt.seconds * 1000) : new Date(post.createdAt); }
  catch(e) { ts = new Date(); }
  const dateStr = ts.toLocaleString('ko-KR');
  const color = CAT_COLORS[post.category] || '#888';

  let filesHTML = '';
  if (post.attachments && post.attachments.length > 0) {
    filesHTML = '<div class="detail-files"><h4>📎 첨부파일</h4>';
    post.attachments.forEach((att, i) => {
      const attKey = (post.id || 'local') + '_' + i;
      window._attStore[attKey] = att;

      if (att.type && att.type.startsWith('image/') && att.url) {
        filesHTML += `
          <div style="margin-bottom:12px;">
            <img src="${escHtml(att.url)}" class="detail-img" onclick="openZoom(window._attStore['${attKey}'].url,'${escHtml(att.name)}')">
            <div style="display:flex;gap:8px;margin-top:5px;">
              <button onclick="downloadAtt('${attKey}')" style="flex:1;background:rgba(232,84,58,0.15);border:1px solid rgba(232,84,58,0.3);color:#ff8a76;border-radius:8px;padding:7px;font-size:0.8rem;cursor:pointer;font-weight:600;">⬇ 다운로드</button>
              <button onclick="openZoom(window._attStore['${attKey}'].url,'${escHtml(att.name)}')" style="flex:1;background:var(--bg4);border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:7px;font-size:0.8rem;cursor:pointer;">🔍 원본 보기</button>
            </div>
          </div>`;
      } else if (att.url) {
        const fi = getFileIcon(att.name, att.type);
        const sizeStr = att.size
          ? (att.size > 1024*1024 ? (att.size/1024/1024).toFixed(1)+'MB' : Math.round(att.size/1024)+'KB')
          : '';
        filesHTML += `
          <div style="background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px;">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
              <span style="font-size:24px;">${fi.icon}</span>
              <div style="flex:1;min-width:0;">
                <div style="font-size:0.85rem;font-weight:700;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escHtml(att.name)}</div>
                <div style="font-size:0.72rem;color:var(--text3);">${fi.label}${sizeStr ? ' · '+sizeStr : ''}</div>
              </div>
            </div>
            <div style="display:flex;gap:8px;">
              <button onclick="openFile('${attKey}')" style="flex:1;background:rgba(74,158,255,0.15);border:1px solid rgba(74,158,255,0.3);color:#4a9eff;border-radius:8px;padding:8px;font-size:0.82rem;cursor:pointer;font-weight:600;">📂 파일 열기</button>
              <button onclick="downloadAtt('${attKey}')" style="flex:1;background:rgba(232,84,58,0.12);border:1px solid rgba(232,84,58,0.25);color:#ff8a76;border-radius:8px;padding:8px;font-size:0.82rem;cursor:pointer;font-weight:600;">⬇ 다운로드</button>
            </div>
          </div>`;
      } else {
        const fi = getFileIcon(att.name, att.type);
        filesHTML += `<div style="background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;gap:10px;opacity:0.5;"><span style="font-size:22px;">${fi.icon}</span><span style="font-size:0.82rem;color:var(--text2);">${escHtml(att.name)} (저장 실패)</span></div>`;
      }
    });
    filesHTML += '</div>';
  }

  detail.innerHTML = `
    <button class="back-btn" onclick="showListView()">← 목록으로</button>
    <span class="post-cat-badge" style="background:${color}22;color:${color};font-size:0.75rem;padding:3px 10px;border-radius:10px">${escHtml(post.category)}</span>
    <div class="detail-title" style="margin-top:8px">${escHtml(post.title)}</div>
    <div class="detail-meta">${escHtml(post.author)} · ${dateStr}</div>
    <div class="detail-body">${escHtml(post.body)}</div>
    ${filesHTML}
    <button class="delete-post-btn" id="delBtn_${escHtml(post.id)}">삭제</button>
  `;

  const delBtn = document.getElementById('delBtn_' + post.id);
  if (delBtn) delBtn.addEventListener('click', () => confirmDeletePost(post.id, post.attachments || []));
}

function showListView() {
  document.getElementById('postListWrap').classList.remove('hide');
  document.getElementById('catFilters').style.display = '';
  const detail = document.getElementById('postDetail');
  detail.classList.remove('show');
  detail.innerHTML = '';
}

async function confirmDeletePost(id, attachments) {
  if (!confirm('게시글을 삭제할까요?')) return;
  try {
    if (window._boardAPI) await window._boardAPI.deletePost(id, attachments);
    if (!window._boardAPI || !window._boardAPI.firebaseReady()) {
      window._allPosts = (window._allPosts || []).filter(p => p.id !== id);
      window.renderPostList();
    }
    showListView();
  } catch(e) { alert('삭제 실패: ' + e.message); }
}

function handleBoardFiles(input) {
  if (!input.files || input.files.length === 0) return;
  Array.from(input.files).forEach(f => {
    // 같은 이름+크기 조합으로 중복 체크 (스마트폰에서 동명 파일 재선택 허용)
    if (!boardFiles.find(x => x.name === f.name && x.size === f.size)) {
      boardFiles.push(f);
    }
  });
  renderFilePreview();
  // ✅ input.value 초기화: 같은 파일 다시 선택 가능하게
  try { input.value = ''; } catch(e) {}
}

function renderFilePreview() {
  const wrap = document.getElementById('filePreview');
  wrap.innerHTML = '';
  boardFiles.forEach((f, i) => {
    const chip = document.createElement('div');
    chip.className = 'file-chip';
    chip.innerHTML = escHtml(f.name) + ' ';
    const btn = document.createElement('button');
    btn.innerText = '✕';
    btn.onclick = () => { boardFiles.splice(i, 1); renderFilePreview(); };
    chip.appendChild(btn);
    wrap.appendChild(chip);
  });
}

async function submitPost() {
  const author = document.getElementById('writeAuthor').value.trim();
  const title = document.getElementById('writeTitle').value.trim();
  const body = document.getElementById('writeBody').value.trim();
  const category = document.getElementById('writeCat').value;

  if (!author) { alert('작성자 이름을 입력하세요.'); return; }
  if (!title)  { alert('제목을 입력하세요.'); return; }
  if (!body)   { alert('내용을 입력하세요.'); return; }
  if (!window._boardAPI) { alert('서비스 초기화 중입니다. 잠시 후 다시 시도하세요.'); return; }

  const btn = document.getElementById('submitBtn');
  const errorEl = document.getElementById('uploadError');
  errorEl.classList.remove('show');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>등록 중...';

  try {
    const newPost = await window._boardAPI.savePost({ author, title, body, category }, boardFiles);
    if (!window._boardAPI.firebaseReady()) {
      window._allPosts = [newPost, ...(window._allPosts || [])];
    }
    document.getElementById('writeAuthor').value = '';
    document.getElementById('writeTitle').value = '';
    document.getElementById('writeBody').value = '';
    boardFiles = [];
    renderFilePreview();
    switchTab('list');
  } catch(e) {
    errorEl.textContent = '❌ 등록 실패: ' + (e.message || '네트워크 오류');
    errorEl.classList.add('show');
    console.error('게시글 등록 오류:', e);
  } finally {
    btn.disabled = false;
    btn.innerText = '게시하기';
    document.getElementById('uploadProgress').classList.remove('show');
  }
}

window.addEventListener('boardAPIReady', () => {
  if (document.getElementById('boardModal').style.display === 'flex') loadBoardPosts();
});

document.addEventListener('DOMContentLoaded', () => { window.renderCalendar(); });
</script>
</body>
</html>
