<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전원설비 WorkHub</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap');
:root {
  --bg: #0f0f11; --bg2: #18181c; --bg3: #1e1e24; --bg4: #28282f;
  --bg5: #32323b;
  --border: #2a2a33; --border2: #35353f;
  --text: #f0f0f5; --text2: #8e8e9a; --text3: #505060;
  --accent: #e8543a; --accent2: #ff7055; --accent-glow: rgba(232,84,58,0.25);
  --blue: #4a9eff; --green: #2dd87a; --amber: #ffb340; --purple: #a78bfa;
  --pink: #f472b6;
  --glass: rgba(255,255,255,0.03);
  --radius-sm: 10px; --radius-md: 14px; --radius-lg: 20px; --radius-xl: 26px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{
  font-family:'Pretendard',-apple-system,sans-serif;
  background:var(--bg);margin:0;padding:10px;padding-bottom:84px;
  color:var(--text);-webkit-user-select:none;user-select:none;
  min-height:100vh;
}

/* ── 헤더 ── */
.header{padding:14px 4px 10px;text-align:center;margin-bottom:10px;}
.nav-controls{display:flex;justify-content:center;align-items:center;gap:12px;}
.nav-btn{
  background:var(--bg3);border:1px solid var(--border);padding:6px 16px;
  border-radius:var(--radius-sm);cursor:pointer;font-weight:600;
  color:var(--text2);font-size:0.83rem;transition:.15s;font-family:inherit;
  letter-spacing:-0.01em;
}
.nav-btn:active{background:var(--bg4);transform:scale(0.96);}
#monthDisplay{font-size:1.25rem;font-weight:800;min-width:130px;color:var(--text);letter-spacing:-0.03em;}
.sync-badge{
  display:inline-flex;align-items:center;gap:4px;
  font-size:0.66rem;padding:3px 8px;border-radius:20px;font-weight:600;
}
.sync-badge.live{background:rgba(45,216,122,0.15);color:var(--green);border:1px solid rgba(45,216,122,0.2);}
.sync-badge.local{background:rgba(255,179,64,0.15);color:var(--amber);border:1px solid rgba(255,179,64,0.2);}
.sync-dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0;}
.sync-dot.pulse{animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}

/* ── 캘린더 ── */
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;max-width:1200px;margin:auto;}
.day-label{text-align:center;font-weight:700;padding:7px 0;color:var(--text3);font-size:0.72rem;letter-spacing:.05em;text-transform:uppercase;}
.day-cell{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius-md);min-height:110px;padding:7px 6px;
  display:flex;flex-direction:column;transition:.12s;
}
.day-cell:hover{border-color:var(--border2);background:var(--bg3);}
.is-today{background:var(--bg3)!important;border-color:var(--accent)!important;box-shadow:0 0 0 1px var(--accent-glow);}
.is-today .date-number{
  background:var(--accent);color:#fff;width:22px;height:22px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:800;
}
.day-cell.add-mode{cursor:pointer;border:1.5px dashed var(--accent);background:rgba(232,84,58,.06);}
.date-number{font-size:.88rem;font-weight:700;margin-bottom:4px;color:var(--text);line-height:1;}
.week-sun .date-number{color:#ff6b6b;}
.week-sat .date-number{color:var(--blue);}
.duty-container{background:var(--glass);border-radius:6px;padding:3px 4px;font-size:.62rem;margin-bottom:3px;border:1px solid rgba(255,255,255,.04);}
.duty-row{display:flex;justify-content:space-between;align-items:center;line-height:1.6;}
b[data-type^="주"]{color:var(--amber);}
b[data-type^="야"]{color:var(--purple);}
b[data-type^="비"]{color:var(--green);}
.item-list{display:flex;flex-direction:column;gap:3px;margin-top:auto;}
.vacation-tag{
  font-size:.63rem;font-weight:700;padding:2px 5px;border-radius:5px;
  background:rgba(232,84,58,.18);color:#ff8a76;border:1px solid rgba(232,84,58,.3);
  cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center;
}
.img-thumb{width:100%;height:34px;object-fit:cover;border-radius:5px;border:1px solid var(--border);cursor:pointer;margin-top:2px;}
@media(max-width:600px){
  .duty-container{display:none;}
  .day-cell{min-height:68px;border-radius:var(--radius-sm);}
  .date-number{font-size:.8rem;}
}

/* ── 바텀 탭 ── */
.quick-wrap{
  position:fixed;bottom:0;left:0;right:0;
  display:flex;align-items:center;z-index:100;
  background:rgba(15,15,17,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  padding:6px 8px;padding-bottom:calc(6px + env(safe-area-inset-bottom));
}
.quick-wrap a{
  flex:1;height:46px;border-radius:var(--radius-sm);
  display:flex;align-items:center;justify-content:center;
  color:var(--text3);text-decoration:none;font-size:19px;
  flex-direction:column;gap:2px;transition:.15s;
}
.quick-wrap a:active{background:var(--bg3);transform:scale(.92);}
.quick-wrap a span.ql{font-size:.52rem;color:var(--text3);font-weight:600;letter-spacing:.01em;}
.add-btn{
  position:fixed;bottom:70px;right:16px;width:52px;height:52px;
  background:var(--accent);color:white;border-radius:50%;border:none;font-size:26px;
  cursor:pointer;z-index:101;display:flex;align-items:center;justify-content:center;
  transition:.15s;box-shadow:0 4px 20px var(--accent-glow);
}
.add-btn:active{background:var(--accent2);transform:scale(.93);}

/* ── 이미지 모달 ── */
#imgModal{
  display:none;position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,.94);z-index:2000;justify-content:center;align-items:center;
}

/* ══════════════════════════════════════
   게시판 모달 — 2026 트렌드 리디자인
══════════════════════════════════════ */
#boardModal{
  display:none;position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,.6);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  z-index:3000;justify-content:center;align-items:flex-end;
  /* 바텀시트 스타일 */
}
.board-container{
  background:var(--bg2);border-radius:var(--radius-xl) var(--radius-xl) 0 0;
  width:100%;max-width:680px;margin:0 auto;
  border:1px solid var(--border2);border-bottom:none;
  max-height:92vh;display:flex;flex-direction:column;
  animation:slideUp .28s cubic-bezier(.32,1.2,.64,1);
}
@keyframes slideUp{from{transform:translateY(100%);opacity:.5}to{transform:translateY(0);opacity:1}}
.board-handle{width:36px;height:4px;background:var(--bg5);border-radius:2px;margin:12px auto 0;}
.board-header{
  padding:14px 18px 12px;display:flex;justify-content:space-between;align-items:center;
  flex-shrink:0;
}
.board-header-left{display:flex;align-items:center;gap:10px;}
.board-title{font-size:1.05rem;font-weight:800;color:var(--text);letter-spacing:-.03em;margin:0;}
.board-close{
  background:var(--bg4);border:1px solid var(--border);color:var(--text2);
  width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:15px;flex-shrink:0;transition:.15s;
}
.board-close:active{background:var(--bg5);}

/* 탭 — 알약형 세그먼트 */
.board-tabs{
  display:flex;padding:0 16px 12px;gap:6px;flex-shrink:0;
}
.board-tab{
  flex:1;padding:9px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);
  background:transparent;font-size:.85rem;cursor:pointer;font-weight:600;
  color:var(--text3);transition:.15s;font-family:inherit;
}
.board-tab.active{
  background:var(--accent);color:#fff;border-color:var(--accent);
  box-shadow:0 2px 12px var(--accent-glow);
}
.board-tab:not(.active):active{background:var(--bg4);}

.board-body{padding:0 16px 16px;overflow-y:auto;flex:1;overscroll-behavior:contain;}

/* 카테고리 필터 — 스크롤 가능 pill */
.post-filters{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch;}
.post-filters::-webkit-scrollbar{display:none;}
.cat-filter{
  padding:5px 13px;border-radius:20px;border:1px solid var(--border);
  background:var(--bg3);font-size:.78rem;cursor:pointer;color:var(--text2);
  transition:.15s;white-space:nowrap;font-weight:600;font-family:inherit;flex-shrink:0;
}
.cat-filter.active{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;border-color:transparent;
  box-shadow:0 2px 10px var(--accent-glow);
}

/* 게시글 목록 카드 — 글래스모피즘 */
.post-list{display:flex;flex-direction:column;gap:8px;}
.post-card{
  border:1px solid var(--border);border-radius:var(--radius-md);
  padding:14px 15px;cursor:pointer;transition:.15s;
  background:var(--bg3);position:relative;overflow:hidden;
}
.post-card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:var(--card-accent,var(--border));border-radius:3px 0 0 3px;
  transition:.15s;
}
.post-card:active{background:var(--bg4);transform:scale(.99);}
.post-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px;}
.post-cat-badge{
  font-size:.66rem;font-weight:700;padding:3px 9px;
  border-radius:20px;white-space:nowrap;flex-shrink:0;letter-spacing:.01em;
}
.post-title{font-size:.92rem;font-weight:700;color:var(--text);line-height:1.4;flex:1;}
.post-bottom{display:flex;align-items:center;justify-content:space-between;}
.post-meta{font-size:.73rem;color:var(--text3);display:flex;align-items:center;gap:6px;}
.post-meta-dot{width:3px;height:3px;border-radius:50%;background:var(--text3);display:inline-block;}
.post-file-badge{
  display:inline-flex;align-items:center;gap:4px;
  font-size:.7rem;color:var(--accent2);font-weight:600;
  background:rgba(232,84,58,.12);padding:2px 8px;border-radius:10px;border:1px solid rgba(232,84,58,.2);
}
.post-empty{text-align:center;color:var(--text3);padding:50px 0;font-size:.9rem;}
.post-empty-icon{font-size:2.5rem;margin-bottom:10px;opacity:.4;}
.post-loading{display:flex;justify-content:center;padding:40px 0;}

/* 게시글 상세 */
.post-detail{display:none;}
.post-detail.show{display:block;}
.post-list-wrap.hide{display:none;}
.back-btn{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:7px 13px;cursor:pointer;font-size:.83rem;color:var(--text2);
  margin-bottom:14px;font-family:inherit;font-weight:600;transition:.15s;
}
.back-btn:active{background:var(--bg4);}
.detail-cat{font-size:.7rem;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.01em;}
.detail-title{font-size:1.08rem;font-weight:800;margin:8px 0 5px;color:var(--text);line-height:1.4;letter-spacing:-.02em;}
.detail-meta{font-size:.76rem;color:var(--text3);margin-bottom:14px;display:flex;align-items:center;gap:6px;}
.detail-divider{height:1px;background:var(--border);margin:0 0 14px;}
.detail-body{font-size:.9rem;line-height:1.8;color:var(--text2);white-space:pre-wrap;margin-bottom:16px;}
.detail-files-section{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-md);padding:14px;margin-bottom:14px;}
.detail-files-title{font-size:.78rem;color:var(--text3);font-weight:700;margin:0 0 10px;letter-spacing:.03em;text-transform:uppercase;}
.detail-img{width:100%;border-radius:var(--radius-sm);cursor:pointer;display:block;}
.file-card{
  display:flex;align-items:center;gap:12px;
  background:var(--bg4);border-radius:var(--radius-sm);padding:11px 12px;
  margin-bottom:8px;border:1px solid var(--border);
}
.file-icon-wrap{
  width:38px;height:38px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;
}
.file-info{flex:1;min-width:0;}
.file-name{font-size:.83rem;font-weight:700;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.file-meta{font-size:.7rem;color:var(--text3);margin-top:2px;}
.file-actions{display:flex;gap:6px;}
.file-btn{
  padding:6px 11px;border-radius:8px;font-size:.76rem;cursor:pointer;
  font-weight:600;border:1px solid;font-family:inherit;transition:.15s;white-space:nowrap;
}
.file-btn-open{background:rgba(74,158,255,.12);border-color:rgba(74,158,255,.25);color:var(--blue);}
.file-btn-dl{background:rgba(232,84,58,.1);border-color:rgba(232,84,58,.22);color:var(--accent2);}
.file-btn:active{opacity:.7;}
.delete-post-btn{
  display:flex;align-items:center;gap:6px;
  background:none;border:1px solid rgba(232,84,58,.25);color:var(--accent2);
  border-radius:var(--radius-sm);padding:8px 14px;cursor:pointer;
  font-size:.8rem;font-family:inherit;font-weight:600;transition:.15s;margin-top:6px;
}
.delete-post-btn:active{background:rgba(232,84,58,.1);}

/* 글쓰기 폼 */
.write-form{display:flex;flex-direction:column;gap:10px;}
.form-label{font-size:.75rem;font-weight:700;color:var(--text3);letter-spacing:.04em;text-transform:uppercase;margin-bottom:4px;}
.form-group{display:flex;flex-direction:column;}
.write-form input,.write-form textarea,.write-form select{
  width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:11px 13px;font-size:.9rem;font-family:inherit;outline:none;resize:vertical;
  color:var(--text);transition:.15s;-webkit-appearance:none;
}
.write-form input:focus,.write-form textarea:focus,.write-form select:focus{
  border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow);
}
.write-form select option{background:var(--bg3);}
.write-form textarea{min-height:130px;line-height:1.6;}

/* 카테고리 버튼 선택 */
.cat-select-row{display:flex;gap:6px;flex-wrap:wrap;}
.cat-select-btn{
  padding:7px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);
  background:var(--bg3);font-size:.82rem;cursor:pointer;color:var(--text2);
  transition:.15s;font-weight:600;font-family:inherit;
}
.cat-select-btn.selected{color:#fff;border-color:transparent;}

/* 파일 업로드 영역 */
.file-upload-area{
  border:1.5px dashed var(--border2);border-radius:var(--radius-md);padding:20px 16px;
  text-align:center;cursor:pointer;color:var(--text3);font-size:.84rem;
  transition:.2s;background:var(--bg3);display:block;
}
.file-upload-area:active,.file-upload-area:hover{border-color:var(--accent);color:var(--accent2);background:rgba(232,84,58,.05);}
.file-upload-icon{font-size:1.8rem;margin-bottom:6px;opacity:.6;}
.file-preview{display:flex;flex-direction:column;gap:6px;margin-top:2px;}
.file-chip{
  display:flex;align-items:center;gap:8px;
  background:var(--bg4);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:8px 11px;font-size:.8rem;
}
.file-chip-icon{font-size:16px;flex-shrink:0;}
.file-chip-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text2);}
.file-chip-size{font-size:.7rem;color:var(--text3);flex-shrink:0;}
.file-chip-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;padding:0;line-height:1;flex-shrink:0;transition:.1s;}
.file-chip-del:active{color:var(--accent2);}

/* 업로드 진행 */
.upload-progress{
  display:none;background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:12px 14px;
}
.upload-progress.show{display:block;}
.upload-progress-text{font-size:.8rem;color:var(--text2);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.progress-bar-wrap{width:100%;height:5px;background:var(--bg4);border-radius:3px;overflow:hidden;}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width .25s ease;width:0%;}
.upload-status-row{display:flex;justify-content:space-between;align-items:center;margin-top:6px;}
.upload-pct{font-size:.7rem;color:var(--text3);font-weight:700;}

.error-msg{
  background:rgba(232,84,58,.1);border:1px solid rgba(232,84,58,.25);color:#ff8a76;
  border-radius:var(--radius-sm);padding:10px 13px;font-size:.83rem;display:none;
  line-height:1.5;
}
.error-msg.show{display:block;}

/* 게시 버튼 */
.submit-btn{
  background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;
  border:none;border-radius:var(--radius-sm);padding:14px;font-size:.95rem;
  font-weight:700;cursor:pointer;transition:.15s;font-family:inherit;
  box-shadow:0 4px 16px var(--accent-glow);letter-spacing:-.01em;
}
.submit-btn:active{opacity:.88;transform:scale(.99);}
.submit-btn:disabled{background:var(--bg4);color:var(--text3);cursor:not-allowed;box-shadow:none;}

/* 스피너 */
.spinner{
  display:inline-block;width:15px;height:15px;
  border:2px solid rgba(255,255,255,.25);border-top-color:#fff;
  border-radius:50%;animation:spin .65s linear infinite;vertical-align:middle;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* 스켈레톤 로딩 */
.skeleton{background:linear-gradient(90deg,var(--bg3) 25%,var(--bg4) 50%,var(--bg3) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:var(--radius-sm);}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skeleton-card{height:76px;border-radius:var(--radius-md);margin-bottom:8px;}
</style>
</head>
<body>

<div class="header">
  <div class="nav-controls">
    <button class="nav-btn" onclick="moveMonthInMode(-1)">이전달</button>
    <span id="monthDisplay"></span>
    <button class="nav-btn" onclick="moveMonthInMode(1)">다음달</button>
    <span id="calSyncBadge" class="sync-badge local"><span class="sync-dot"></span> 로컬</span>
  </div>
</div>
<div class="calendar-grid" id="calendarGrid"></div>

<div class="quick-wrap">
  <a href="https://www.airport.kr/geomap/ap_ko/view.do?type=2&tmnlId=P01" target="_blank">🗺️<span class="ql">지도</span></a>
  <a href="https://weather.naver.com/" target="_blank">🌤️<span class="ql">날씨</span></a>
  <a href="https://news.naver.com/main/home.naver" target="_blank">📰<span class="ql">뉴스</span></a>
  <a href="https://icn-cafeteria.web.app/" target="_blank">🍴<span class="ql">식단</span></a>
  <a href="#" onclick="openBoard();return false;">📋<span class="ql">게시판</span></a>
</div>
<button class="add-btn" id="mainAddBtn" onclick="toggleAddMode()">+</button>
<input type="file" id="imageInput" style="display:none" accept="image/*" onchange="handleFileUpload(this)">

<!-- 이미지 모달 -->
<div id="imgModal" onclick="closeImgModal(event)">
  <div style="position:relative;max-width:95%;max-height:90%;display:flex;flex-direction:column;align-items:center;gap:12px;">
    <img id="modalImg" src="" style="max-width:100%;max-height:75vh;border-radius:14px;display:block;">
    <div style="display:flex;gap:10px;">
      <button id="modalDownBtn" onclick="downloadModalImg(event)" style="background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:white;padding:9px 22px;border-radius:22px;cursor:pointer;font-size:.85rem;font-weight:700;">⬇ 다운로드</button>
      <button onclick="closeImgModalDirect()" style="background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.7);padding:9px 20px;border-radius:22px;cursor:pointer;font-size:.85rem;">닫기</button>
    </div>
  </div>
</div>

<!-- 게시판 모달 -->
<div id="boardModal" onclick="closeBoardIfOutside(event)">
  <div class="board-container">
    <div class="board-handle"></div>
    <div class="board-header">
      <div class="board-header-left">
        <h2 class="board-title">📋 전원설비 게시판</h2>
        <span id="boardSyncBadge" class="sync-badge local"><span class="sync-dot"></span> 로컬</span>
      </div>
      <button class="board-close" onclick="closeBoard()">✕</button>
    </div>
    <div class="board-tabs">

// ── 이미지 압축 → Blob ──
function compressImage(file, maxW, quality) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('파일 읽기 실패'));
    reader.onload = e => {
      const img = new Image();
      img.onerror = () => reject(new Error('이미지 로드 실패'));
      img.onload = () => {
        const ratio = Math.min(maxW/img.width, maxW/img.height, 1);
        const canvas = document.createElement('canvas');
        canvas.width = img.width*ratio; canvas.height = img.height*ratio;
        canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
        canvas.toBlob(blob => blob ? resolve(blob) : reject(new Error('압축 실패')), 'image/jpeg', quality);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ── 파일 → base64 변환 (Storage 없이 Firestore에 직접 저장) ──
// ✅ Firebase Storage CORS/Rules 문제 완전 제거
// ✅ 이미지는 압축, 나머지는 원본 base64
// ✅ 10초 타임아웃으로 무한로딩 방지
async function fileToAttachment(file, onProgress) {
  const ext = (file.name||'').split('.').pop().toLowerCase();
  const isJpgCompatible = ['jpg','jpeg','png','gif','webp'].includes(ext)
    || (file.type.startsWith('image/') && !['heic','heif'].includes(ext));

  if(onProgress) onProgress(10);

  let b64;
  try {
    if(isJpgCompatible) {
      // 이미지 압축 후 base64
      const blob = await Promise.race([
        compressImage(file, 1200, 0.85),
        new Promise((_,rej)=>setTimeout(()=>rej(new Error('압축 타임아웃')),10000))
      ]);
      b64 = await new Promise((res,rej)=>{
        const r=new FileReader();
        r.onload=e=>res(e.target.result);
        r.onerror=()=>rej(new Error('읽기 실패'));
        r.readAsDataURL(blob);
      });
    } else {
      // 그 외 파일 (엑셀·한글·PDF·HEIC 등): 원본 그대로 base64
      b64 = await Promise.race([
        new Promise((res,rej)=>{
          const r=new FileReader();
          r.onload=e=>res(e.target.result);
          r.onerror=()=>rej(new Error('파일 읽기 실패'));
          r.readAsDataURL(file);
        }),
        new Promise((_,rej)=>setTimeout(()=>rej(new Error('파일 읽기 타임아웃 (10초)')),10000))
      ]);
    }
  } catch(e) {
    // 압축 실패 시 원본 그대로 재시도
    b64 = await Promise.race([
      new Promise((res,rej)=>{
        const r=new FileReader();
        r.onload=e=>res(e.target.result);
        r.onerror=()=>rej(new Error('파일 읽기 최종 실패'));
        r.readAsDataURL(file);
      }),
      new Promise((_,rej)=>setTimeout(()=>rej(new Error('파일 읽기 타임아웃')),10000))
    ]);
  }

  if(onProgress) onProgress(90);
  return {
    name: file.name,
    url: b64,          // base64 data URL — Firestore 별도 문서에 저장됨
    type: file.type || 'application/octet-stream',
    size: file.size
  };
}

// ── 로컬 폴백 ──
function fileToBase64(file) {
  return new Promise((resolve,reject) => {
    const r=new FileReader();
    r.onerror=()=>reject(new Error('읽기 실패'));
    r.onload=e=>resolve(e.target.result);
    r.readAsDataURL(file);
  });
}

// ── 연차 저장/삭제 ──
async function saveVacation(dateKey, entry) {
  if(firebaseReady){
    await addDoc(collection(db,'vacations'),{dateKey,name:entry.name||'',type:entry.type||'',img:entry.img||''});
  } else {
    const k='power_system_v5_stable', raw=localStorage.getItem(k), d=raw?JSON.parse(raw):{};
    if(!d[dateKey]) d[dateKey]=[];
    d[dateKey].push(entry); localStorage.setItem(k,JSON.stringify(d));
    window._vacationData=d; if(typeof window.renderCalendar==='function') window.renderCalendar();
  }
}
async function removeVacation(dateKey, index) {
  if(firebaseReady&&window._vacationData){
    const item=(window._vacationData[dateKey]||[])[index];
    if(item?._firestoreId){ await deleteDoc(doc(db,'vacations',item._firestoreId)); return; }
  }
  const k='power_system_v5_stable', raw=localStorage.getItem(k), d=raw?JSON.parse(raw):{};
  if(d[dateKey]){ d[dateKey].splice(index,1); if(!d[dateKey].length) delete d[dateKey]; }
  localStorage.setItem(k,JSON.stringify(d)); window._vacationData=d;
  if(typeof window.renderCalendar==='function') window.renderCalendar();
}

// ── 게시글 저장 ──
// ✅ 무한로딩 핵심 수정:
//  1) 파일별 개별 타임아웃 (uploadFileToStorage 내부)
//  2) 파일 실패해도 continue → Firestore 저장은 반드시 실행
//  3) Firestore 저장 30초 타임아웃
//  4) 최종 finally에서 UI 복구 (submitPost에서 담당)
async function savePost(post, files) {
  const attachments = [];
  const progressEl = document.getElementById('uploadProgress');
  const progressText = document.getElementById('uploadProgressText');
  const progressBar = document.getElementById('progressBar');
  const progressPct = document.getElementById('uploadPct');
  const errorEl = document.getElementById('uploadError');
  const MAX_MB = 5; // base64는 원본보다 ~33% 커지므로 5MB 제한

  errorEl.classList.remove('show');

  for(let i=0; i<files.length; i++) {
    const file = files[i];
    if(file.size > MAX_MB*1024*1024) {
      errorEl.textContent = `⚠️ "${file.name}" 이 ${MAX_MB}MB를 초과합니다.`;
      errorEl.classList.add('show');
      continue;
    }

    progressText.textContent = `(${i+1}/${files.length}) ${file.name} 변환 중...`;
    progressBar.style.width = '10%';
    progressPct.textContent = '10%';
    progressEl.classList.add('show');

    try {
      // ✅ Storage 없이 base64로 변환 — 네트워크 의존 없음
      const att = await fileToAttachment(file, pct => {
        progressBar.style.width = pct+'%';
        progressPct.textContent = pct+'%';
        progressText.textContent = `(${i+1}/${files.length}) ${file.name} ${pct}%`;
      });
      attachments.push(att);
      progressBar.style.width = '100%';
      progressPct.textContent = '100%';
      progressText.textContent = `✅ ${file.name} 완료`;
    } catch(err) {
      console.error('파일 변환 오류:', err);
      errorEl.textContent = `⚠️ "${file.name}" 실패: ${err.message}`;
      errorEl.classList.add('show');
      // 실패해도 continue
    }
  }

  progressEl.classList.remove('show');

  // ✅ Firestore 1MB 제한 우회:
  // 첨부파일(base64)은 별도 'attachments' 문서에 저장
  // posts 문서에는 첨부파일 ID 참조만 저장
  let attDocId = null;
  if(attachments.length > 0 && firebaseReady) {
    const attRef = await Promise.race([
      addDoc(collection(db,'attachments'), { files: attachments }),
      new Promise((_,rej)=>setTimeout(()=>rej(new Error('첨부파일 저장 시간 초과')),20000))
    ]);
    attDocId = attRef.id;
  }

  const postData = {
    ...post,
    // Firestore posts 문서에는 base64 없이 참조 ID만
    attachments: attachments.map(a=>({ name:a.name, type:a.type, size:a.size })),
    attDocId: attDocId || null,
    createdAt: firebaseReady ? serverTimestamp() : Date.now()
  };

  if(firebaseReady) {
    const docRef = await Promise.race([
      addDoc(collection(db,'posts'), postData),
      new Promise((_,rej)=>setTimeout(()=>rej(new Error('서버 저장 시간 초과')), 20000))
    ]);
    // 로컬 캐시용으로 attachments도 붙여서 반환
    return { id:docRef.id, ...postData, _localAttachments: attachments };
  } else {
    const k='workhub_board_v1', id='local_'+Date.now();
    const fullPost = { id, ...postData, attachments }; // 로컬은 base64 포함
    const posts=[fullPost,...(JSON.parse(localStorage.getItem(k)||'[]'))];
    localStorage.setItem(k,JSON.stringify(posts));
    return fullPost;
  }
}

async function deletePost(id, attachments, attDocId) {
  if(firebaseReady){
    // 첨부파일 별도 문서도 함께 삭제
    if(attDocId) try{ await deleteDoc(doc(db,'attachments',attDocId)); }catch(e){}
    await deleteDoc(doc(db,'posts',id));
  } else {
    const k='workhub_board_v1';
    localStorage.setItem(k, JSON.stringify((JSON.parse(localStorage.getItem(k)||'[]')).filter(p=>p.id!==id)));
  }
}
async function loadPostsLocal() {
  return (JSON.parse(localStorage.getItem('workhub_board_v1')||'[]')).sort((a,b)=>b.createdAt-a.createdAt);
}

async function loadAttachments(attDocId) {
  if(!firebaseReady || !attDocId) return null;
  try {
    const snap = await Promise.race([
      getDoc(doc(db,'attachments',attDocId)),
      new Promise((_,rej)=>setTimeout(()=>rej(new Error('첨부파일 로드 타임아웃')),10000))
    ]);
    if(snap.exists()) return snap.data().files || [];
  } catch(e) { console.warn('loadAttachments error:', e); }
  return null;
}

window._boardAPI = { savePost, deletePost, loadPostsLocal, loadAttachments, firebaseReady:()=>firebaseReady };
window._vacationAPI = { saveVacation, removeVacation };
window.dispatchEvent(new Event('boardAPIReady'));
</script>

<script>
// ── 전역 초기화 ──
window._vacationData = window._vacationData||{};
window._allPosts = window._allPosts||[];
window._attStore = {};

const cycle=['주1','주2','야1','야2','비1','비2'];
const baseDate=new Date(2026,3,26);
const t1StartIdx=2;
let current=new Date(), isAddMode=false;
let pendingEntry={name:'',type:'',img:''}, activeDateKey='';
const STORAGE_KEY='power_system_v5_stable';

const CAT_COLORS={'공지':'#e74c3c','업무':'#3498db','질문':'#e67e22','자유':'#27ae60'};
const CATEGORIES=['전체','공지','업무','질문','자유'];
let boardFiles=[], currentCatFilter='전체';
let selectedCat='업무';

function escHtml(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function getFileIcon(name,mime){
  const ext=(name||'').split('.').pop().toLowerCase();
  if(['xlsx','xls','csv'].includes(ext)) return{icon:'📊',label:'Excel',bg:'rgba(29,111,66,.2)',color:'#2dd87a'};
  if(['hwp','hwpx'].includes(ext)) return{icon:'📝',label:'HWP',bg:'rgba(0,82,165,.2)',color:'#4a9eff'};
  if(['pdf'].includes(ext)) return{icon:'📄',label:'PDF',bg:'rgba(231,76,60,.2)',color:'#ff8a76'};
  if(['doc','docx'].includes(ext)) return{icon:'📃',label:'Word',bg:'rgba(43,87,154,.2)',color:'#4a9eff'};
  if(['ppt','pptx'].includes(ext)) return{icon:'📊',label:'PPT',bg:'rgba(210,71,38,.2)',color:'#ff7055'};
  if(['zip','7z','rar'].includes(ext)) return{icon:'📦',label:'ZIP',bg:'rgba(100,100,100,.2)',color:'#8e8e9a'};
  if(mime&&mime.startsWith('image/')) return{icon:'🖼️',label:'이미지',bg:'rgba(232,84,58,.2)',color:'#ff8a76'};
  return{icon:'📎',label:ext.toUpperCase()||'FILE',bg:'rgba(100,100,100,.2)',color:'#8e8e9a'};
}

// ── 카테고리 선택 버튼 ──
function selectCat(btn) {
  document.querySelectorAll('.cat-select-btn').forEach(b=>{
    b.classList.remove('selected');
    b.style.background=''; b.style.borderColor='';
  });
  btn.classList.add('selected');
  const cc = btn.style.getPropertyValue('--cc') || CAT_COLORS[btn.dataset.cat] || '#888';
  btn.style.background=cc; btn.style.borderColor=cc;
  selectedCat = btn.dataset.cat;
  document.getElementById('writeCat').value = btn.dataset.cat;
}

function getDutyValue(targetDate, offset) {
  const diff=Math.round((new Date(targetDate.getFullYear(),targetDate.getMonth(),targetDate.getDate())
    -new Date(baseDate.getFullYear(),baseDate.getMonth(),baseDate.getDate()))/(86400000));
  return cycle[(((t1StartIdx+diff+offset)%6)+6)%6];
}

// ── 캘린더 렌더 ──
window.renderCalendar = function() {
  const grid=document.getElementById('calendarGrid');
  if(!grid) return;
  grid.innerHTML='';
  const y=current.getFullYear(), m=current.getMonth();
  document.getElementById('monthDisplay').innerText=y+'년 '+(m+1)+'월';
  const data=window._vacationData||{};
  ['일','월','화','수','목','금','토'].forEach(d=>{
    const el=document.createElement('div'); el.className='day-label'; el.innerText=d; grid.appendChild(el);
  });
  const firstDay=new Date(y,m,1).getDay(), lastDate=new Date(y,m+1,0).getDate();
  for(let i=0;i<firstDay;i++) grid.appendChild(document.createElement('div'));
  for(let d=1;d<=lastDate;d++){
    const dObj=new Date(y,m,d);
    const key=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const cell=document.createElement('div');
    cell.className='day-cell';
    if(dObj.toDateString()===new Date().toDateString()) cell.classList.add('is-today');
    if(dObj.getDay()===0) cell.classList.add('week-sun');
    if(dObj.getDay()===6) cell.classList.add('week-sat');
    if(isAddMode){cell.classList.add('add-mode');cell.onclick=()=>onCellClick(key);}
    const num=document.createElement('span'); num.className='date-number'; num.innerText=d; cell.appendChild(num);
    const dutyBox=document.createElement('div'); dutyBox.className='duty-container';
    for(let k=0;k<3;k++){
      const v=getDutyValue(dObj,k*2), row=document.createElement('div');
      row.className='duty-row';
      row.innerHTML='<span>'+(k+1)+'조</span><b data-type="'+v+'">'+v+'</b>';
      dutyBox.appendChild(row);
    }
    cell.appendChild(dutyBox);
    const list=document.createElement('div'); list.className='item-list';
    if(data[key]) data[key].forEach((item,idx)=>{
      if(item.name){
        const tag=document.createElement('div'); tag.className='vacation-tag';
        tag.innerText=item.name+'('+(item.type||'')+')';
        tag.onclick=e=>{e.stopPropagation();deleteItem(key,idx);}; list.appendChild(tag);
      }
      if(item.img){
        const img=document.createElement('img'); img.src=item.img; img.className='img-thumb';
        img.onclick=e=>{e.stopPropagation();openZoom(item.img,item.name||'이미지');};
        img.oncontextmenu=e=>{e.preventDefault();deleteItem(key,idx);}; list.appendChild(img);
      }
    });
    cell.appendChild(list); grid.appendChild(cell);
  }
};

function toggleAddMode(){
  if(isAddMode){isAddMode=false;document.getElementById('mainAddBtn').innerText='+';window.renderCalendar();return;}
  const name=prompt('성함을 입력하세요 (사진만 올리려면 확인)')||'';
  const type=name?(prompt('종류 (연차/반차/교육 등)')||''):'';
  pendingEntry={name,type,img:''};isAddMode=true;
  document.getElementById('mainAddBtn').innerText='✕';
  alert('등록할 날짜 칸을 선택하세요.\n이전달/다음달 이동 후 선택도 가능합니다.');window.renderCalendar();
}
function onCellClick(key){
  activeDateKey=key;
  if(confirm('사진을 함께 등록하시겠습니까?')){document.getElementById('imageInput').click();}
  else{pendingEntry.name||pendingEntry.img?finishRegistration():(isAddMode=false,document.getElementById('mainAddBtn').innerText='+',window.renderCalendar());}
}
function handleFileUpload(input){
  if(input.files&&input.files[0]){
    const r=new FileReader();
    r.onload=e=>{pendingEntry.img=e.target.result;finishRegistration();};
    r.onerror=()=>finishRegistration();
    r.readAsDataURL(input.files[0]);
  } else{pendingEntry.name?finishRegistration():(isAddMode=false,document.getElementById('mainAddBtn').innerText='+',window.renderCalendar());}
  input.value='';
}
function waitForAPI(key,ms=5000){
  return new Promise(res=>{
    if(window[key]){res(true);return;}
    const t=Date.now(); const c=setInterval(()=>{if(window[key]){clearInterval(c);res(true);}else if(Date.now()-t>ms){clearInterval(c);res(false);}},100);
  });
}
async function finishRegistration(){
  isAddMode=false;document.getElementById('mainAddBtn').innerText='+';
  if(!pendingEntry.name&&!pendingEntry.img){window.renderCalendar();return;}
  if(!(await waitForAPI('_vacationAPI'))){localSaveVac(activeDateKey,{...pendingEntry});return;}
  try{await window._vacationAPI.saveVacation(activeDateKey,{...pendingEntry});}
  catch(e){localSaveVac(activeDateKey,{...pendingEntry});}
}
function localSaveVac(k,entry){
  const raw=localStorage.getItem(STORAGE_KEY),d=raw?JSON.parse(raw):{};
  if(!d[k]) d[k]=[]; d[k].push(entry); localStorage.setItem(STORAGE_KEY,JSON.stringify(d));
  window._vacationData=d; window.renderCalendar();
}
async function deleteItem(key,idx){
  if(!confirm('정말 삭제할까요?')) return;
  await waitForAPI('_vacationAPI',3000);
  if(window._vacationAPI){try{await window._vacationAPI.removeVacation(key,idx);}catch(e){alert('삭제 실패');}}
  else{
    const raw=localStorage.getItem(STORAGE_KEY),d=raw?JSON.parse(raw):{};
    if(d[key]){d[key].splice(idx,1);if(!d[key].length) delete d[key];}
    localStorage.setItem(STORAGE_KEY,JSON.stringify(d));window._vacationData=d;window.renderCalendar();
  }
}
function openZoom(src,filename){
  document.getElementById('modalImg').src=src;
  document.getElementById('modalDownBtn').dataset.src=src;
  document.getElementById('modalDownBtn').dataset.name=filename||'이미지';
  document.getElementById('imgModal').style.display='flex';
}
function closeImgModal(e){if(e.target===document.getElementById('imgModal')) document.getElementById('imgModal').style.display='none';}
function closeImgModalDirect(){document.getElementById('imgModal').style.display='none';}
function downloadModalImg(e){e.stopPropagation();const b=document.getElementById('modalDownBtn');dlImg(b.dataset.src,b.dataset.name);}
function dlImg(src,name){const a=document.createElement('a');a.href=src;a.download=name||'이미지.jpg';a.target='_blank';document.body.appendChild(a);a.click();document.body.removeChild(a);}
function openFile(k){
  const a=window._attStore[k]; if(!a?.url){alert('파일 없음');return;}
  if(a.url.startsWith('https://')){window.open(a.url,'_blank');return;}
  try{
    const ci=a.url.indexOf(','); const mime=a.url.substring(5,ci).split(';')[0]||'application/octet-stream';
    const b64=a.url.substring(ci+1); const bstr=atob(b64); const u8=new Uint8Array(bstr.length);
    for(let i=0;i<bstr.length;i++) u8[i]=bstr.charCodeAt(i);
    const url=URL.createObjectURL(new Blob([u8],{type:mime}));
    window.open(url,'_blank'); setTimeout(()=>URL.revokeObjectURL(url),60000);
  }catch(e){dlImg(a.url,a.name);}
}
function downloadAtt(k){const a=window._attStore[k];if(!a?.url){alert('파일 없음');return;}dlImg(a.url,a.name);}
function moveMonth(n){current=new Date(current.getFullYear(),current.getMonth()+n,1);window.renderCalendar();}

// add-mode 중 이전달/다음달 — isAddMode 상태 유지하며 월 이동
function moveMonthInMode(n){
  current=new Date(current.getFullYear(),current.getMonth()+n,1);
  window.renderCalendar();
  // add-mode였으면 안내 버튼 텍스트 유지
  if(isAddMode) document.getElementById('mainAddBtn').innerText='✕';
}

// ── 게시판 ──
function openBoard(){document.getElementById('boardModal').style.display='flex';loadBoardPosts();}
function closeBoard(){document.getElementById('boardModal').style.display='none';}
function closeBoardIfOutside(e){if(e.target===document.getElementById('boardModal')) closeBoard();}

function switchTab(tab){
  document.getElementById('tabList').classList.toggle('active', tab==='list');
  document.getElementById('tabWrite').classList.toggle('active', tab==='write');
  document.getElementById('tabListContent').style.display = tab==='list' ? '' : 'none';
  document.getElementById('tabWriteContent').style.display = tab==='write' ? '' : 'none';
  if(tab==='list') loadBoardPosts();
  if(tab==='write'){
    document.getElementById('uploadError').classList.remove('show');
    document.getElementById('uploadProgress').classList.remove('show');
  }
}

function buildCatFilters(){
  const wrap=document.getElementById('catFilters'); wrap.innerHTML='';
  CATEGORIES.forEach(cat=>{
    const btn=document.createElement('button'); btn.className='cat-filter'+(cat===currentCatFilter?' active':'');
    btn.innerText=cat;
    btn.onclick=()=>{currentCatFilter=cat;buildCatFilters();window.renderPostList();};
    wrap.appendChild(btn);
  });
}
async function loadBoardPosts(){
  showListView(); buildCatFilters();
  if(window._boardAPI?.firebaseReady()){window.renderPostList();return;}
  document.getElementById('postList').innerHTML='<div class="skeleton-card skeleton"></div><div class="skeleton-card skeleton"></div>';
  try{if(window._boardAPI) window._allPosts=await window._boardAPI.loadPostsLocal();}catch(e){}
  window.renderPostList();
}
window.renderPostList=function(){
  const list=document.getElementById('postList'); if(!list) return;
  const all=window._allPosts||[];
  const filtered=currentCatFilter==='전체'?all:all.filter(p=>p.category===currentCatFilter);
  if(!filtered.length){
    list.innerHTML='<div class="post-empty"><div class="post-empty-icon">📭</div>게시글이 없습니다.</div>';return;
  }
  list.innerHTML='';
  filtered.forEach(post=>{
    const card=document.createElement('div'); card.className='post-card';
    let ts; try{ts=post.createdAt?.seconds?new Date(post.createdAt.seconds*1000):new Date(post.createdAt);}catch(e){ts=new Date();}
    const dateStr=ts.toLocaleDateString('ko-KR',{month:'2-digit',day:'2-digit'})+' '+ts.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
    const color=CAT_COLORS[post.category]||'#888';
    const fc=post.attachments?.length||0;
    card.style.setProperty('--card-accent',color);
    card.innerHTML=`
      <div class="post-card-top">
        <div class="post-title">${escHtml(post.title)}</div>
        <span class="post-cat-badge" style="background:${color}22;color:${color};border:1px solid ${color}33">${escHtml(post.category)}</span>
      </div>
      <div class="post-bottom">
        <div class="post-meta">
          <span>${escHtml(post.author)}</span>
          <span class="post-meta-dot"></span>
          <span>${dateStr}</span>
        </div>
        ${fc>0?`<span class="post-file-badge">📎 ${fc}</span>`:''}
      </div>`;
    card.onclick=()=>showPostDetail(post); list.appendChild(card);
  });
};

async function showPostDetail(post){
  document.getElementById('postListWrap').classList.add('hide');
  document.getElementById('catFilters').style.display='none';
  const detail=document.getElementById('postDetail'); detail.classList.add('show');

  // 첨부파일 로컬 캐시 or Firestore에서 로드
  let fullAttachments = post._localAttachments || post.attachments || [];
  if(post.attDocId && window._boardAPI && window._boardAPI.firebaseReady()) {
    try {
      const loaded = await window._boardAPI.loadAttachments(post.attDocId);
      if(loaded) fullAttachments = loaded;
    } catch(e) { console.warn('첨부파일 로드 실패:', e); }
  }
  // 렌더용 임시 저장
  post._resolvedAttachments = fullAttachments;

  let ts; try{ts=post.createdAt?.seconds?new Date(post.createdAt.seconds*1000):new Date(post.createdAt);}catch(e){ts=new Date();}
  const color=CAT_COLORS[post.category]||'#888';

  let filesHTML='';
  const attList = post._resolvedAttachments || [];
  if(attList.length){
    filesHTML='<div class="detail-files-section"><div class="detail-files-title">📎 첨부파일 '+attList.length+'개</div>';
    attList.forEach((att,i)=>{
      const k=(post.id||'local')+'_'+i; window._attStore[k]=att;
      const ext=(att.name||'').split('.').pop().toLowerCase();
      const isImg=att.type?.startsWith('image/')||['jpg','jpeg','png','gif','webp'].includes(ext);
      if(isImg&&att.url){
        filesHTML+=`<div style="margin-bottom:12px;">
          <img src="${escHtml(att.url)}" class="detail-img" style="border-radius:10px;margin-bottom:8px;" onclick="openZoom(window._attStore['${k}'].url,'${escHtml(att.name)}')">
          <div style="display:flex;gap:6px;">
            <button class="file-btn file-btn-dl" style="flex:1" onclick="downloadAtt('${k}')">⬇ 다운로드</button>
            <button class="file-btn" style="flex:1;background:var(--bg5);border-color:var(--border);color:var(--text2)" onclick="openZoom(window._attStore['${k}'].url,'${escHtml(att.name)}')">🔍 원본 보기</button>
          </div></div>`;
      } else if(att.url){
        const fi=getFileIcon(att.name,att.type);
        const sz=att.size?(att.size>1048576?(att.size/1048576).toFixed(1)+'MB':Math.round(att.size/1024)+'KB'):'';
        filesHTML+=`<div class="file-card">
          <div class="file-icon-wrap" style="background:${fi.bg}">${fi.icon}</div>
          <div class="file-info">
            <div class="file-name">${escHtml(att.name)}</div>
            <div class="file-meta">${fi.label}${sz?' · '+sz:''}</div>
          </div>
          <div class="file-actions">
            <button class="file-btn file-btn-open" onclick="openFile('${k}')">열기</button>
            <button class="file-btn file-btn-dl" onclick="downloadAtt('${k}')">저장</button>
          </div></div>`;
      }
    });
    filesHTML+='</div>';
  }

  detail.innerHTML=`
    <button class="back-btn" onclick="showListView()">← 목록</button>
    <span class="detail-cat" style="background:${color}22;color:${color};border:1px solid ${color}33">${escHtml(post.category)}</span>
    <div class="detail-title">${escHtml(post.title)}</div>
    <div class="detail-meta">
      <span>${escHtml(post.author)}</span>
      <span class="post-meta-dot"></span>
      <span>${ts.toLocaleString('ko-KR')}</span>
    </div>
    <div class="detail-divider"></div>
    <div class="detail-body">${escHtml(post.body)}</div>
    ${filesHTML}
    <button class="delete-post-btn" id="delBtn_${escHtml(post.id)}">🗑 게시글 삭제</button>`;

  const del=document.getElementById('delBtn_'+post.id);
  if(del) del.addEventListener('click',()=>confirmDeletePost(post.id, post.attachments||[], post.attDocId||null));
}
function showListView(){
  document.getElementById('postListWrap').classList.remove('hide');
  document.getElementById('catFilters').style.display='';
  const d=document.getElementById('postDetail'); d.classList.remove('show'); d.innerHTML='';
}
async function confirmDeletePost(id,atts,attDocId){
  if(!confirm('정말 삭제할까요?')) return;
  try{
    if(window._boardAPI) await window._boardAPI.deletePost(id, atts, attDocId);
    if(!window._boardAPI?.firebaseReady()){
      window._allPosts=(window._allPosts||[]).filter(p=>p.id!==id);
      window.renderPostList();
    }
    showListView();
  }catch(e){alert('삭제 실패: '+e.message);}
}

function handleBoardFiles(input){
  if(!input.files?.length) return;
  Array.from(input.files).forEach(f=>{
    if(!boardFiles.find(x=>x.name===f.name&&x.size===f.size)) boardFiles.push(f);
  });
  renderFilePreview(); try{input.value='';}catch(e){}
}
function renderFilePreview(){
  const wrap=document.getElementById('filePreview'); wrap.innerHTML='';
  boardFiles.forEach((f,i)=>{
    const fi=getFileIcon(f.name,f.type);
    const sz=f.size>1048576?(f.size/1048576).toFixed(1)+'MB':Math.round(f.size/1024)+'KB';
    const chip=document.createElement('div'); chip.className='file-chip';
    chip.innerHTML=`<span class="file-chip-icon">${fi.icon}</span>
      <span class="file-chip-name">${escHtml(f.name)}</span>
      <span class="file-chip-size">${sz}</span>`;
    const del=document.createElement('button'); del.className='file-chip-del'; del.innerHTML='✕';
    del.onclick=()=>{boardFiles.splice(i,1);renderFilePreview();};
    chip.appendChild(del); wrap.appendChild(chip);
  });
}

// ✅ submitPost — finally로 버튼 무조건 복구 (무한로딩 완전 방지)
async function submitPost(){
  const author=document.getElementById('writeAuthor').value.trim();
  const title=document.getElementById('writeTitle').value.trim();
  const body=document.getElementById('writeBody').value.trim();
  const category=document.getElementById('writeCat').value||selectedCat;
  if(!author){alert('작성자 이름을 입력하세요.');return;}
  if(!title){alert('제목을 입력하세요.');return;}
  if(!body){alert('내용을 입력하세요.');return;}
  if(!window._boardAPI){alert('초기화 중입니다. 잠시 후 다시 시도하세요.');return;}
  // Storage 미연결 상태에서 파일 있으면 경고
  if(boardFiles.length > 0 && !window._storageReady) {
    const go = confirm('Firebase Storage에 연결되지 않아 파일을 서버에 저장할 수 없습니다.\n파일 없이 글만 등록할까요?');
    if(!go) return;
    boardFiles = [];
    renderFilePreview();
  }

  const btn=document.getElementById('submitBtn');
  const errorEl=document.getElementById('uploadError');
  errorEl.classList.remove('show');
  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span> 등록 중...';

  try{
    const newPost=await window._boardAPI.savePost({author,title,body,category},boardFiles);
    if(!window._boardAPI.firebaseReady()) window._allPosts=[newPost,...(window._allPosts||[])];
    document.getElementById('writeAuthor').value='';
    document.getElementById('writeTitle').value='';
    document.getElementById('writeBody').value='';
    boardFiles=[]; renderFilePreview();
    switchTab('list');
  }catch(e){
    errorEl.textContent='❌ 등록 실패: '+(e.message||'알 수 없는 오류');
    errorEl.classList.add('show');
    console.error('submitPost error:',e);
  } finally {
    // ✅ 성공·실패·타임아웃 무관하게 버튼 항상 복구
    btn.disabled=false;
    btn.innerText='게시하기';
    document.getElementById('uploadProgress').classList.remove('show');
    document.getElementById('progressBar').style.width='0%';
    document.getElementById('uploadPct').textContent='0%';
  }
}

window.addEventListener('boardAPIReady',()=>{
  if(document.getElementById('boardModal').style.display==='flex') loadBoardPosts();
});
document.addEventListener('DOMContentLoaded',()=>window.renderCalendar());
</script>
