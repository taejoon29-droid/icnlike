<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorkHub Firebase Stable</title>

<!-- Firebase CDN -->
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>

<style>
body{
margin:0;
font-family:system-ui;
background:#eef6ff;
}

/* 버튼 */
.board-float{
position:fixed;
right:15px;
top:50%;
transform:translateY(-50%);
z-index:999;
}

.board-float button{
width:55px;
height:55px;
border-radius:50%;
border:none;
background:#2c3e50;
color:#fff;
font-size:22px;
cursor:pointer;
}

/* 모달 */
.board-modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
z-index:1000;
}

.board-box{
width:90%;
max-width:420px;
background:#fff;
padding:15px;
border-radius:10px;
max-height:80vh;
overflow:auto;
}

input,textarea{
width:100%;
padding:8px;
margin:5px 0;
box-sizing:border-box;
}

.board-item{
border:1px solid #ddd;
padding:10px;
margin-top:8px;
border-radius:8px;
background:#fafafa;
}

.board-item img{
width:100%;
margin-top:5px;
border-radius:6px;
}

button{
cursor:pointer;
}
</style>
</head>

<body>

<h3 style="text-align:center">📋 Firebase 실시간 게시판</h3>

<!-- 버튼 -->
<div class="board-float">
<button onclick="openBoard()">📋</button>
</div>

<!-- 게시판 -->
<div id="boardModal" class="board-modal" onclick="closeBoard(event)">
<div class="board-box" onclick="event.stopPropagation()">

<h3>게시판</h3>

<input id="title" placeholder="제목">
<textarea id="content" placeholder="내용"></textarea>
<input type="file" id="img">

<button onclick="addPost()">등록</button>

<hr>

<div id="list"></div>

</div>
</div>

<script>

console.log("Firebase init start");

/* =========================
   1. Firebase 초기화
========================= */
const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_AUTH_DOMAIN",
projectId: "YOUR_PROJECT_ID",
storageBucket: "YOUR_STORAGE_BUCKET",
messagingSenderId: "YOUR_SENDER_ID",
appId: "YOUR_APP_ID"
};

/* 중복 초기화 방지 (검수 핵심) */
if (!firebase.apps.length) {
firebase.initializeApp(firebaseConfig);
}

const db = firebase.firestore();
const COL = "board";

/* =========================
   2. 게시판 열기/닫기
========================= */
function openBoard(){
const modal=document.getElementById("boardModal");
if(modal) modal.style.display="flex";
}

function closeBoard(e){
if(e.target.id==="boardModal"){
document.getElementById("boardModal").style.display="none";
}
}

/* =========================
   3. 글 작성 (안정형)
========================= */
function addPost(){

const title=document.getElementById("title").value || "";
const content=document.getElementById("content").value || "";
const file=document.getElementById("img").files[0];

if(!title && !content){
alert("내용 입력");
return;
}

const save=(img="")=>{
db.collection(COL).add({
title,
content,
img,
time: Date.now()
});
};

if(file){
const reader=new FileReader();
reader.onload=e=>save(e.target.result);
reader.readAsDataURL(file);
}else{
save();
}

/* 입력 초기화 */
document.getElementById("title").value="";
document.getElementById("content").value="";
document.getElementById("img").value="";
}

/* =========================
   4. 실시간 렌더링 (핵심)
========================= */
function listen(){

db.collection(COL)
.orderBy("time","desc")
.onSnapshot((snap)=>{

const list=document.getElementById("list");
if(!list) return;

list.innerHTML="";

snap.forEach(doc=>{
const d=doc.data();

const div=document.createElement("div");
div.className="board-item";

div.innerHTML=`
<b>${d.title || ""}</b><br>
<small>${new Date(d.time).toLocaleString()}</small>
<p>${d.content || ""}</p>
${d.img ? `<img src="${d.img}">` : ""}
<br>
<button onclick="del('${doc.id}')">삭제</button>
`;

list.appendChild(div);
});

}, (err)=>{
console.error("Firestore error:", err);
});

}

/* =========================
   5. 삭제
========================= */
function del(id){
if(!confirm("삭제?")) return;

db.collection(COL)
.doc(id)
.delete();
}

/* =========================
   6. 시작
========================= */
window.onload = ()=>{
listen();
};

</script>

</body>
</html>
