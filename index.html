<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전원설비 공유 현황판</title>

<style>
:root { 
    --primary: #2c3e50; --accent: #e74c3c; --today: #3498db; --border: #dee2e6;
}

body {
    font-family: 'Pretendard', sans-serif;
    background: #f4f7f6;
    margin: 0;
    padding: 10px;
    color: #333;
}

.header {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    text-align: center;
    margin-bottom: 15px;
}

.nav-controls {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    margin-top: 10px;
}

.nav-btn {
    background: #fff;
    border: 1px solid #ddd;
    padding: 8px 15px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
}

#monthDisplay {
    font-size: 1.4rem;
    font-weight: 800;
    min-width: 160px;
    display: inline-block;
}

.calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
    max-width: 1200px;
    margin: auto;
}

.day-label {
    text-align: center;
    font-weight: bold;
    padding: 10px;
    background: var(--primary);
    color: white;
    border-radius: 6px;
}

.day-cell {
    background: white;
    border: 1px solid var(--border);
    border-radius: 10px;
    min-height: 160px;
    padding: 10px;
    transition: background 0.2s;
}

.day-cell.add-mode {
    cursor: pointer;
    border: 2px dashed var(--accent);
}
.day-cell.add-mode:hover {
    background: #fff5f5;
}

.date-number {
    font-size: 1.1rem;
    font-weight: bold;
    margin-bottom: 8px;
    display: block;
}

.is-today {
    border: 3px solid var(--today) !important;
    background: #ebf5fb;
}

.duty-container {
    background: #fcfcfc;
    border-radius: 6px;
    padding: 6px;
    font-size: 0.75rem;
    margin-bottom: 8px;
    border: 1px solid #eee;
}

.duty-row {
    display: flex;
    justify-content: space-between;
}

.vacation-list {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
}

.vacation-tag {
    font-size: 0.72rem;
    font-weight: bold;
    padding: 2px 6px;
    border-radius: 4px;
    cursor: pointer;
    background: #eee;
}

.food-btn {
    position: fixed;
    bottom: 100px;
    right: 30px;
    width: 60px;
    height: 60px;
    background: #27ae60;
    color: white;
    border-radius: 50%;
    border: none;
    font-size: 24px;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    z-index: 100;
}

.add-btn {
    position: fixed;
    bottom: 30px;
    right: 30px;
    width: 60px;
    height: 60px;
    background: var(--accent);
    color: white;
    border-radius: 50%;
    border: none;
    font-size: 30px;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    z-index: 100;
}

b[data-type^="주"] { color: #d4a017; }
b[data-type^="야"] { color: #8e44ad; }
b[data-type^="비"] { color: #27ae60; }

.week-sun .date-number { color: #e74c3c; }
.week-sat .date-number { color: #3498db; }

</style>
</head>

<body>

<div class="header">
    <div class="nav-controls">
        <button class="nav-btn" onclick="moveMonth(-1)">◀ 이전달</button>
        <span id="monthDisplay"></span>
        <button class="nav-btn" onclick="moveMonth(1)">다음달 ▶</button>
    </div>
</div>

<div class="calendar-grid" id="calendarGrid"></div>

<!-- 식단표 링크: https://icn-cafeteria.web.app/ 정상 반영됨 -->
<button class="food-btn" onclick="window.open('https://icn-cafeteria.web.app/', '_blank')">🍴</button>
<button class="add-btn" id="mainAddBtn" onclick="toggleAddMode()">+</button>

<script>
const cycle = ['주1','주2','야1','야2','비1','비2'];
const baseDate = new Date(2026, 3, 26); // 2026-04-26
const t1StartIdx = 2; // 1조 야1

let current = new Date();
let isAddMode = false;
let pendingInfo = { name: '', type: '' };

function load() { return JSON.parse(localStorage.getItem('vac') || '{}'); }
function save(data) { localStorage.setItem('vac', JSON.stringify(data)); }

function getDuty(date, off) {
    const d1 = new Date(baseDate.getFullYear(), baseDate.getMonth(), baseDate.getDate());
    const d2 = new Date(date.getFullYear(), date.getMonth(), date.getDate());
    const diff = Math.round((d2 - d1) / (1000 * 60 * 60 * 24));
    const idx = (((t1StartIdx + diff + off) % 6) + 6) % 6;
    return cycle[idx];
}

function render() {
    const grid = document.getElementById('calendarGrid');
    if(!grid) return;
    grid.innerHTML = '';

    const y = current.getFullYear();
    const m = current.getMonth();
    const today = new Date();

    document.getElementById('monthDisplay').innerText = `${y}년 ${m+1}월`;
    const data = load();

    ['일','월','화','수','목','금','토'].forEach(d => {
        const el = document.createElement('div');
        el.className = 'day-label';
        el.innerText = d;
        grid.appendChild(el);
    });

    const firstDay = new Date(y, m, 1).getDay();
    const lastDate = new Date(y, m + 1, 0).getDate();

    for(let i=0; i<firstDay; i++) grid.appendChild(document.createElement('div'));

    for(let d=1; d<=lastDate; d++){
        const date = new Date(y, m, d);
        const key = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const cell = document.createElement('div');
        cell.className = 'day-cell';

        if(isAddMode) {
            cell.classList.add('add-mode');
            cell.onclick = () => confirmAdd(key);
        }

        if(date.toDateString() === today.toDateString()) cell.classList.add('is-today');
        if(date.getDay() === 0) cell.classList.add('week-sun');
        if(date.getDay() === 6) cell.classList.add('week-sat');

        let dutyHtml = '<div class="duty-container">';
        // 검수: 오프셋 [0, 2, 4]를 정확히 삽입했습니다.
        const offsets = [0, 2, 4]; 
        offsets.forEach((off, i) => {
            const v = getDuty(date, off);
            dutyHtml += `<div class="duty-row"><span>${i+1}조</span><b data-type="${v}">${v}</b></div>`;
        });
        dutyHtml += '</div>';

        let vacHtml = '<div class="vacation-list">';
        if(data[key]){
            data[key].forEach((v, idx) => {
                vacHtml += `<span class="vacation-tag" onclick="event.stopPropagation(); del('${key}',${idx})">${v.name}(${v.type})</span>`;
            });
        }
        vacHtml += '</div>';

        cell.innerHTML = `<span class="date-number">${d}</span>${dutyHtml}${vacHtml}`;
        grid.appendChild(cell);
    }
}

function toggleAddMode() {
    if(isAddMode) { resetAddMode(); return; }
    const name = prompt('이름');
    if(!name) return;
    const type = prompt('구분');
    if(!type) return;
    pendingInfo = { name, type };
    isAddMode = true;
    document.getElementById('mainAddBtn').innerText = '✕';
    alert('달력에서 등록할 날짜 칸을 클릭하세요.');
    render();
}

function confirmAdd(key) {
    let data = load();
    if(!data[key]) data[key] = [];
    data[key].push(pendingInfo);
    save(data);
    resetAddMode();
}

function resetAddMode() {
    isAddMode = false;
    document.getElementById('mainAddBtn').innerText = '+';
    render();
}

function del(key, idx) {
    if(!confirm('삭제?')) return;
    let data = load();
    data[key].splice(idx, 1);
    if(data[key].length === 0) delete data[key];
    save(data);
    render();
}

function moveMonth(n) {
    if(isAddMode) resetAddMode();
    current.setMonth(current.getMonth() + n);
    render();
}

document.addEventListener('DOMContentLoaded', render);
</script>

</body>
</html>
