<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorkHub Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Pretendard&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f6f1eb;
  --card:#ffffff;
  --accent:#ff6a00;
  --text:#2c2c2c;
  --sub:#777;
  --border:#e5ded6;
}

body{
  margin:0;
  font-family:'Pretendard', sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* 상단 */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px;
  border-bottom:1px solid var(--border);
}

.logo{
  font-family:'Playfair Display', serif;
  font-size:28px;
}

.month-nav button{
  border:none;
  background:none;
  font-size:20px;
  cursor:pointer;
}

/* 레이아웃 */
.layout{
  display:flex;
  gap:20px;
  padding:20px;
}

.calendar{
  flex:2;
  background:var(--card);
  border-radius:16px;
  padding:20px;
}

.board{
  flex:1;
  background:var(--card);
  border-radius:16px;
  padding:20px;
}

/* 캘린더 */
.grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:8px;
}

.day{
  border:1px solid var(--border);
  border-radius:10px;
  padding:6px;
  min-height:90px;
  cursor:pointer;
}

.day:hover{
  border-color:var(--accent);
}

.date{
  font-weight:bold;
}

.tag{
  background:rgba(255,106,0,0.1);
  color:var(--accent);
  padding:2px 6px;
  border-radius:6px;
  font-size:12px;
  margin-top:4px;
}

/* 게시판 */
.write input, .write textarea{
  width:100%;
  margin-bottom:8px;
  padding:8px;
  border-radius:8px;
  border:1px solid var(--border);
}

button{
  background:var(--accent);
  color:white;
  border:none;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
}

.post{
  border-bottom:1px solid var(--border);
  padding:10px 0;
}

.post b{
  font-size:14px;
}

</style>
</head>

<body>

<div class="topbar">
  <div class="logo">WorkHub.</div>
  <div class="month-nav">
    <button onclick="moveMonth(-1)">‹</button>
    <span id="month"></span>
    <button onclick="moveMonth(1)">›</button>
  </div>
</div>

<div class="layout">

  <!-- 캘린더 -->
  <div class="calendar">
    <div class="grid" id="calendar"></div>
  </div>

  <!-- 게시판 -->
  <div class="board">
    <h3>게시판</h3>

    <div class="write">
      <input id="author" placeholder="작성자">
      <input id="title" placeholder="제목">
      <textarea id="content" placeholder="내용"></textarea>
      <button onclick="addPost()">등록</button>
    </div>

    <div id="posts"></div>
  </div>

</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import {
  getFirestore, collection, addDoc, onSnapshot
} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "여기에키",
  authDomain: "여기에",
  projectId: "여기에"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.db = db;
window.addDoc = addDoc;
window.collection = collection;
window.onSnapshot = onSnapshot;

/* =========================
   캘린더
========================= */
let current = new Date();
let data = {};

function renderCalendar(){
  const el = document.getElementById('calendar');
  el.innerHTML = '';

  const y = current.getFullYear();
  const m = current.getMonth();

  document.getElementById('month').innerText = `${y}.${m+1}`;

  const last = new Date(y, m+1, 0).getDate();

  for(let i=1;i<=last;i++){
    const key = `${y}-${m+1}-${i}`;

    const d = document.createElement('div');
    d.className='day';

    d.innerHTML = `<div class="date">${i}</div>`;

    if(data[key]){
      data[key].forEach(v=>{
        const tag = document.createElement('div');
        tag.className='tag';
        tag.innerText = v;
        d.appendChild(tag);
      });
    }

    d.onclick = ()=>{
      const name = prompt('이름 입력');
      if(!name) return;

      if(!data[key]) data[key]=[];
      data[key].push(name);

      saveVacation(key,name);
    };

    el.appendChild(d);
  }
}

function moveMonth(n){
  current.setMonth(current.getMonth()+n);
  renderCalendar();
}

/* =========================
   연차 Firebase
========================= */
function saveVacation(date,name){
  addDoc(collection(db,'vacation'),{
    date,name
  });
}

onSnapshot(collection(db,'vacation'), snap=>{
  data={};
  snap.forEach(doc=>{
    const d=doc.data();
    if(!data[d.date]) data[d.date]=[];
    data[d.date].push(d.name);
  });
  renderCalendar();
});

/* =========================
   게시판
========================= */
const postsEl = document.getElementById('posts');

window.addPost = function(){
  const author = document.getElementById('author').value;
  const title = document.getElementById('title').value;
  const content = document.getElementById('content').value;

  addDoc(collection(db,'posts'),{
    author,title,content,createdAt:Date.now()
  });
}

onSnapshot(collection(db,'posts'), snap=>{
  postsEl.innerHTML='';
  snap.forEach(doc=>{
    const d = doc.data();
    const div = document.createElement('div');
    div.className='post';
    div.innerHTML = `<b>${d.title}</b><div>${d.author}</div><p>${d.content}</p>`;
    postsEl.appendChild(div);
  });
});

renderCalendar();

</script>

</body>
</html>
