<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전원설비 실시간 공유 현황판</title>
    <!-- Firebase SDK (버전 8 최적화) -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <style>
        :root { 
            --primary: #2c3e50; --accent: #e74c3c; --today: #3498db; --border: #dee2e6;
            --col-vacation: #1890ff; --col-work: #27ae60; --col-special: #e67e22; --col-leave: #8e44ad;
        }
        body { font-family: 'Pretendard', sans-serif; background: #f4f7f6; margin: 0; padding: 10px; color: #333; }
        .header { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); text-align: center; margin-bottom: 15px; }
        .nav-controls { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 10px; }
        .nav-btn { background: #fff; border: 1px solid #ddd; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .stat-btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; margin-top: 15px; font-weight: bold; }
        #monthDisplay { font-size: 1.4rem; font-weight: 800; min-width: 160px; display: inline-block; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; max-width: 1200px; margin: auto; }
        .day-label { text-align: center; font-weight: bold; padding: 10px; background: var(--primary); color: white; border-radius: 6px; }
        .day-cell { background: white; border: 1px solid var(--border); border-radius: 10px; min-height: 160px; padding: 10px; position: relative; box-sizing: border-box; }
        .date-number { font-size: 1.1rem; font-weight: bold; margin-bottom: 8px; display: block; }
        .is-today { border: 3px solid var(--today) !important; background: #ebf5fb; }
        .duty-container { background: #fcfcfc; border-radius: 6px; padding: 6px; font-size: 0.75rem; margin-bottom: 8px; border: 1px solid #eee; }
        .duty-row { display: flex; justify-content: space-between; margin-bottom: 2px; }
        b[data-type^="주"] { color: #d4a017; } b[data-type^="야"] { color: #8e44ad; } b[data-type^="비"] { color: #27ae60; }
        .vacation-list { display: flex; flex-wrap: wrap; gap: 4px; }
        .vacation-tag { font-size: 0.72rem; font-weight: bold; padding: 2px 6px; border-radius: 4px; border: 1px solid transparent; cursor: pointer; }
        .type-vacation { background: #eaf2ff; border-color: #adc8ff; color: var(--col-vacation); }
        .type-work { background: #eafff1; border-color: #b7ebc1; color: var(--col-work); }
        .type-special { background: #fff7e6; border-color: #ffd591; color: var(--col-special); }
        .type-leave { background: #f3e5f5; border-color: #d1c4e9; color: var(--col-leave); }
        .food-btn { position: fixed; bottom: 100px; right: 30px; width: 60px; height: 60px; background: #27ae60; color: white; border-radius: 50%; border: none; font-size: 24px; cursor: pointer; z-index: 100; box-shadow: 0 5px 15px rgba(39,174,96,0.4); display: flex; align-items: center; justify-content: center; }
        .add-btn { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: var(--accent); color: white; border-radius: 50%; border: none; font-size: 30px; cursor: pointer; z-index: 100; box-shadow: 0 5px 15px rgba(231,76,60,0.4); }
        #registerBox, #statBox { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 1000; width: 320px; max-height: 80vh; overflow-y: auto; }
        #registerBox input, #registerBox select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; }
        .stat-table { width: 100%; border-collapse: collapse; }
        .stat-table th, .stat-table td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="header">
    <div class="nav-controls">
        <button class="nav-btn" onclick="moveMonth(-1)">◀ 이전달</button>
        <span id="monthDisplay"></span>
        <button class="nav-btn" onclick="moveMonth(1)">다음달 ▶</button>
    </div>
    <button class="stat-btn" onclick="openStatistics()">📊 이번 달 통계 보기</button>
    <p style="font-size: 0.85rem; color: #666; margin-top:10px;">기준: 2026-04-26 1조 야1 | 순환: 주주야야비비</p>
</div>

<div class="calendar-grid" id="calendarGrid"></div>
<button class="food-btn" onclick="window.open('https://web.app', '_blank')" title="오늘의 식단">🍴</button>
<button class="add-btn" onclick="toggleRegister(true)">+</button>
<div class="overlay" id="overlay" onclick="closeAllModals()"></div>

<div id="registerBox">
    <h3 style="margin-top:0">일정 등록</h3>
    <input type="text" id="regName" placeholder="성함 입력">
    <select id="regType" onchange="checkDirectInput(this.value)">
        <option value="연차">연차</option>
        <option value="전반반차">전반반차</option>
        <option value="후반반차">후반반차</option>
        <option value="휴가">휴가</option>
        <option value="출장">출장</option>
        <option value="교육">교육</option>
        <option value="건강검진">건강검진</option>
        <option value="etc">기타 (직접 입력)</option>
    </select>
    <input type="text" id="regDirect" placeholder="내용 직접 입력" style="display:none;">
    <input type="date" id="regDate">
    <div style="display:flex; gap:10px; margin-top:15px">
        <button class="nav-btn" style="flex:1; background:#eee" onclick="toggleRegister(false)">취소</button>
        <button class="nav-btn" style="flex:1; background:var(--today); color:white; border:none" onclick="saveVacation()">등록</button>
    </div>
</div>

<div id="statBox">
    <h3 id="statTitle" style="margin-top:0">월간 통계</h3>
    <div id="statContent"></div>
    <button class="nav-btn" style="width:100%; margin-top:20px; background:var(--primary); color:white;" onclick="closeAllModals()">닫기</button>
</div>

<script>
    // Firebase 설정
    const firebaseConfig = {
      apiKey: "AIzaSyArsOzrlKqK1BPH6ugGAhRWaq_gYmkvyIE",
      authDomain: "://firebaseapp.com",
      projectId: "gogo-3d2c8",
      storageBucket: "gogo-3d2c8.firebasestorage.app",
      messagingSenderId: "156358451768",
      appId: "1:156358451768:web:5311651d3f83ce23b6fccd"
    };

    // Firebase 초기화 (오류 방지)
    try {
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
    } catch (e) { console.error("Firebase 초기화 실패", e); }
    
    const db = firebase.firestore();

    const cycle = ['주1', '주2', '야1', '야2', '비1', '비2'];
    const baseDate = new Date(2026, 3, 26); 
    const t1StartIdx = 2; 
    let currentViewDate = new Date(2026, 3, 26); 

    window.onload = () => { renderCalendar(); };

    function moveMonth(step) {
        currentViewDate.setMonth(currentViewDate.getMonth() + step);
        renderCalendar();
    }

    async function renderCalendar() {
        const grid = document.getElementById('calendarGrid');
        const display = document.getElementById('monthDisplay');
        if(!grid || !display) return;

        grid.innerHTML = '';
        const year = currentViewDate.getFullYear();
        const month = currentViewDate.getMonth();
        display.innerText = `${year}년 ${month + 1}월`;

        ['일','월','화','수','목','금','토'].forEach(day => {
            const el = document.createElement('div'); el.className = 'day-label'; el.innerText = day; grid.appendChild(el);
        });

        const firstDayIdx = new Date(year, month, 1).getDay();
        const lastDate = new Date(year, month + 1, 0).getDate();
        for (let i = 0; i < firstDayIdx; i++) grid.appendChild(document.createElement('div'));

        // 데이터 로드
        let savedData = {};
        try {
            const snapshot = await db.collection("vacations").get();
            snapshot.forEach(doc => savedData[doc.id] = doc.data().items);
        } catch (e) { console.error("데이터 로드 실패", e); }

        for (let d = 1; d <= lastDate; d++) {
            const targetDate = new Date(year, month, d);
            const dateId = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            
            const diffTime = targetDate.setHours(0,0,0,0) - baseDate.setHours(0,0,0,0);
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            
            let t1Idx = (t1StartIdx + diffDays) % 6; while (t1Idx < 0) t1Idx += 6;
            const t2Idx = (t1Idx + 2) % 6, t3Idx = (t1Idx + 4) % 6;

            const isToday = new Date().toLocaleDateString() === targetDate.toLocaleDateString() ? 'is-today' : '';
            const cell = document.createElement('div');
            cell.className = `day-cell ${isToday}`;
            
            let tagsHtml = "";
            if (savedData[dateId]) {
                tagsHtml = savedData[dateId].map(item => 
                    `<span class="vacation-tag ${getColorClass(item.type)}" onclick="removeVacation('${dateId}', '${item.name}', '${item.type}')">${item.name} (${item.type})</span>`
                ).join('');
            }

            cell.innerHTML = `<span class="date-number">${d}</span>
                <div class="duty-container">
                    <div class="duty-row"><span>1조</span><b data-type="${cycle[t1Idx]}">${cycle[t1Idx]}</b></div>
                    <div class="duty-row"><span>2조</span><b data-type="${cycle[t2Idx]}">${cycle[t2Idx]}</b></div>
                    <div class="duty-row"><span>3조</span><b data-type="${cycle[t3Idx]}">${cycle[t3Idx]}</b></div>
                </div>
                <div class="vacation-list">${tagsHtml}</div>`;
            grid.appendChild(cell);
        }
    }

    async function saveVacation() {
        const name = document.getElementById('regName').value.trim();
        const dateId = document.getElementById('regDate').value;
        let type = document.getElementById('regType').value;
        if(type === 'etc') type = document.getElementById('regDirect').value.trim();

        if(!name || !dateId || !type) return alert("항목을 입력하세요.");
        
        try {
            const docRef = db.collection("vacations").doc(dateId);
            const doc = await docRef.get();
            let items = doc.exists ? doc.data().items : [];
            items.push({ name, type });
            await docRef.set({ items });
            toggleRegister(false); renderCalendar();
        } catch (e) { alert("저장 실패: 규칙을 확인하세요."); }
    }

    async function removeVacation(dateId, name, type) {
        if(!confirm("삭제할까요?")) return;
        try {
            const docRef = db.collection("vacations").doc(dateId);
            const doc = await docRef.get();
            let items = doc.data().items.filter(i => !(i.name === name && i.type === type));
            await docRef.set({ items });
            renderCalendar();
        } catch (e) { alert("삭제 실패"); }
    }

    async function openStatistics() {
        const year = currentViewDate.getFullYear(), month = currentViewDate.getMonth() + 1;
        const prefix = `${year}-${String(month).padStart(2,'0')}`;
        const snapshot = await db.collection("vacations").get();
        let stats = {};
        snapshot.forEach(doc => {
            if(doc.id.startsWith(prefix)) {
                doc.data().items.forEach(item => {
                    if(!stats[item.name]) stats[item.name] = {};
                    stats[item.name][item.type] = (stats[item.name][item.type] || 0) + 1;
                });
            }
        });
        let html = `<table class="stat-table"><tr><th>이름</th><th>구분</th><th>일수</th></tr>`;
        for(let name in stats) {
            for(let type in stats[name]) html += `<tr><td>${name}</td><td>${type}</td><td>${stats[name][type]}일</td></tr>`;
        }
        document.getElementById('statContent').innerHTML = Object.keys(stats).length ? html+"</table>" : "데이터가 없습니다.";
        document.getElementById('statTitle').innerText = `${month}월 통계`;
        document.getElementById('statBox').style.display = 'block';
        document.getElementById('overlay').style.display = 'block';
    }

    function toggleRegister(show) { document.getElementById('registerBox').style.display = show ? 'block' : 'none'; document.getElementById('overlay').style.display = show ? 'block' : 'none'; }
    function closeAllModals() { document.getElementById('registerBox').style.display = 'none'; document.getElementById('statBox').style.display = 'none'; document.getElementById('overlay').style.display = 'none'; }
    function checkDirectInput(v) { document.getElementById('regDirect').style.display = v==='etc'?'block':'none'; }
    function getColorClass(t) { if(t.includes('연차')||t.includes('반차')) return 'type-vacation'; if(t.includes('출장')||t.includes('교육')) return 'type-work'; if(t.includes('검진')) return 'type-special'; return 'type-leave'; }
</script>
</body>
</html>
